      {modal === 'yeni' && (
        <MusteriFormModal
          baslik="Yeni Müşteri"
          onKapat={() => setModal(null)}
          onKaydet={(veri) => {
            setMusteriler([...musteriler, { id: yeniId(), ...veri }]);
            setModal(null);
          }}
        />
      )}
      {modal?.tip === 'duzenle' && (
        <MusteriFormModal
          baslik="Müşteri Düzenle"
          baslangicVerileri={modal.musteri}
          onKapat={() => setModal(null)}
          onKaydet={(veri) => {
            setMusteriler(musteriler.map(m => m.id === modal.musteri.id ? {...m, ...veri} : m));
            setModal(null);
          }}
        />
      )}
    </div>
  );
}

function HizliVeresiyeModal({ tip, musteri, mevcutBakiye, formatPara, onKapat, onKaydet, duzenlenenKayit }) {
  const borcMu = tip === 'borc';
  const duzenlemeMi = !!duzenlenenKayit;
  
  // BORÇ MODU: Kalem kalem ekleme
  const [kalemler, setKalemler] = useState(() => {
    if (duzenlemeMi && borcMu) {
      // Düzenleme: önce kayıttaki "kalemler" dizisi var mı kontrol et
      if (duzenlenenKayit.kalemler && Array.isArray(duzenlenenKayit.kalemler) && duzenlenenKayit.kalemler.length > 0) {
        // Eski kalemleri olduğu gibi yükle
        return duzenlenenKayit.kalemler.map((k, i) => ({
          id: i + 1,
          ad: k.ad || '',
          adet: (k.adet || 1).toString(),
          fiyat: (k.fiyat || 0).toString()
        }));
      }
      // Eski kayıt: tek kalem olarak göster (geriye uyumluluk)
      return [{
        id: 1,
        ad: duzenlenenKayit.urunAdi || '',
        adet: '1',
        fiyat: duzenlenenKayit.tutar.toString()
      }];
    }
    return borcMu ? [{ id: 1, ad: '', adet: '1', fiyat: '' }] : [];
  });
  
  // ÖDEME MODU: Tek tutar
  const [tekTutar, setTekTutar] = useState(duzenlemeMi && !borcMu ? duzenlenenKayit.tutar.toString() : '');
  const [tekUrunAdi, setTekUrunAdi] = useState(duzenlemeMi && !borcMu ? (duzenlenenKayit.urunAdi || '') : '');
  
  // Her ikisi için
  const [aciklama, setAciklama] = useState(duzenlemeMi ? (duzenlenenKayit.aciklama || '') : '');

  // Kalem ekle
  const kalemEkle = () => {
    const yeniId = kalemler.length > 0 ? Math.max(...kalemler.map(k => k.id)) + 1 : 1;
    setKalemler([...kalemler, { id: yeniId, ad: '', adet: '1', fiyat: '' }]);
  };

  // Kalem güncelle
  const kalemGuncelle = (id, alan, deger) => {
    setKalemler(kalemler.map(k => k.id === id ? { ...k, [alan]: deger } : k));
  };

  // Kalem sil
  const kalemSil = (id) => {
    if (kalemler.length === 1) {
      // Son kalem - sıfırla
      setKalemler([{ id: 1, ad: '', adet: '1', fiyat: '' }]);
    } else {
      setKalemler(kalemler.filter(k => k.id !== id));
    }
  };

  // Toplam hesapla
  const toplam = useMemo(() => {
    if (borcMu) {
      return kalemler.reduce((t, k) => {
        const adet = parseFloat(k.adet) || 0;
        const fiyat = parseFloat(k.fiyat) || 0;
        return t + (adet * fiyat);
      }, 0);
    }
    return parseFloat(tekTutar) || 0;
  }, [kalemler, tekTutar, borcMu]);

  const kaydet = () => {
    if (borcMu) {
      // Borç modu: en az 1 geçerli kalem olmalı
      const gecerliKalemler = kalemler.filter(k => 
        k.ad.trim() && parseFloat(k.adet) > 0 && parseFloat(k.fiyat) > 0
      );
      if (gecerliKalemler.length === 0) {
        return alert('En az bir kalem ekleyin (ürün adı, adet ve fiyat dolu olmalı)');
      }
      if (toplam <= 0) return alert('Toplam tutar 0\'dan büyük olmalı');
      
      // Kalemleri tek bir metin olarak birleştir (ürün adı kısmına)
      const urunAdi = gecerliKalemler.map(k => {
        const adet = parseFloat(k.adet);
        return adet > 1 ? `${k.ad.trim()} (${adet}x)` : k.ad.trim();
      }).join(', ');
      
      // Kalemleri yapılandırılmış olarak da gönder (düzenleme için)
      const kalemlerYapilandirilmis = gecerliKalemler.map(k => ({
        ad: k.ad.trim(),
        adet: parseFloat(k.adet),
        fiyat: parseFloat(k.fiyat)
      }));
      
      onKaydet(urunAdi, toplam, aciklama.trim(), kalemlerYapilandirilmis);
    } else {
      // Ödeme modu: tek tutar
      const t = parseFloat(tekTutar);
      if (!t || t <= 0) return alert('Geçerli bir tutar girin');
      onKaydet(tekUrunAdi.trim(), t, aciklama.trim(), null);
    }
  };

  // Düzenleme modunda eski etki çıkarılıp yenisi eklenir
  const eskiEtki = duzenlemeMi 
    ? (duzenlenenKayit.tip === 'borc' ? duzenlenenKayit.tutar : -duzenlenenKayit.tutar)
    : 0;
  const yeniEtki = borcMu ? toplam : -toplam;
  const yeniBakiye = duzenlemeMi 
    ? (mevcutBakiye - eskiEtki + yeniEtki)
    : (borcMu ? mevcutBakiye + toplam : mevcutBakiye - toplam);

  const baslik = duzenlemeMi 
    ? (borcMu ? 'Borç Düzenle' : 'Ödeme Düzenle')
    : (borcMu ? 'Borç Ekle' : 'Ödeme Al');

  return (
    <Modal baslik={baslik} onKapat={onKapat}>
      {duzenlemeMi && (
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-lg p-2.5 mb-3 flex items-center gap-2">
          <Edit2 className="w-4 h-4 text-amber-600 flex-shrink-0" />
          <p className="text-xs text-amber-700 font-medium">
            Mevcut kayıt düzenleniyor. Eski tutar: <b>{formatPara(duzenlenenKayit.tutar)}</b>
          </p>
        </div>
      )}

      {/* Müşteri bilgi kartı */}
      <div className={`p-3 rounded-lg mb-4 border ${borcMu ? 'bg-rose-500/5 border-rose-500/20' : 'bg-emerald-500/5 border-emerald-500/20'}`}>
        <div className="flex items-center gap-2 mb-1">
          <Users className={`w-4 h-4 ${borcMu ? 'text-rose-600' : 'text-emerald-600'}`} />
          <p className="font-semibold">{musteri.ad}</p>
        </div>
        {musteri.telefon && <p className="text-xs text-slate-500 ml-6">{musteri.telefon}</p>}
        <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-200">
          <span className="text-xs text-slate-500 uppercase tracking-wider">Mevcut Bakiye</span>
          <span className={`font-mono font-semibold text-sm ${mevcutBakiye > 0 ? 'text-rose-600' : mevcutBakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>
            {formatPara(Math.abs(mevcutBakiye))} {mevcutBakiye > 0 ? '(borçlu)' : mevcutBakiye < 0 ? '(alacaklı)' : ''}
          </span>
        </div>
      </div>

      {borcMu ? (
        // ====================== BORÇ MODU - KALEMLER ======================
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider">
              Kalemler ({kalemler.length})
            </label>
            <button
              type="button"
              onClick={kalemEkle}
              className="flex items-center gap-1 px-2.5 py-1 bg-rose-500/10 border border-rose-500/30 text-rose-700 rounded-md text-xs font-semibold hover:bg-rose-500/20"
            >
              <Plus className="w-3.5 h-3.5" /> Kalem Ekle
            </button>
          </div>

          <div className="space-y-2 max-h-[300px] overflow-y-auto pr-1">
            {kalemler.map((k, idx) => {
              const kalemToplam = (parseFloat(k.adet) || 0) * (parseFloat(k.fiyat) || 0);
              return (
                <div key={k.id} className="bg-slate-50 border border-slate-200 rounded-lg p-2.5">
                  <div className="flex items-start gap-2 mb-2">
                    <span className="text-xs font-bold text-slate-400 bg-white border border-slate-200 rounded w-5 h-5 flex items-center justify-center flex-shrink-0 mt-1">
                      {idx + 1}
                    </span>
                    <input
                      type="text"
                      value={k.ad}
                      onChange={e => kalemGuncelle(k.id, 'ad', e.target.value)}
                      placeholder="Ürün/hizmet adı (örn: Akü 60Ah)"
                      className="flex-1 px-2 py-1.5 bg-white border border-slate-200 rounded text-sm focus:outline-none focus:border-amber-500/50"
                      autoFocus={idx === kalemler.length - 1}
                    />
                    <button
                      type="button"
                      onClick={() => kalemSil(k.id)}
                      className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-500/10 rounded flex-shrink-0"
                    >
                      <Trash2 className="w-3.5 h-3.5" />
                    </button>
                  </div>
                  <div className="flex items-center gap-2 ml-7">
                    <div className="flex items-center gap-1">
                      <input
                        type="number"
                        value={k.adet}
                        onChange={e => kalemGuncelle(k.id, 'adet', e.target.value)}
                        placeholder="1"
                        min="0"
                        step="1"
                        className="w-14 px-2 py-1 bg-white border border-slate-200 rounded text-sm text-center font-mono focus:outline-none focus:border-amber-500/50"
                      />
                      <span className="text-xs text-slate-400">adet</span>
                    </div>
                    <span className="text-slate-300">×</span>
                    <div className="flex items-center gap-1 flex-1">
                      <input
                        type="number"
                        value={k.fiyat}
                        onChange={e => kalemGuncelle(k.id, 'fiyat', e.target.value)}
                        placeholder="0.00"
                        step="0.01"
                        min="0"
                        className="w-24 px-2 py-1 bg-white border border-slate-200 rounded text-sm text-right font-mono focus:outline-none focus:border-amber-500/50"
                      />
                      <span className="text-xs text-slate-400">₺</span>
                    </div>
                    <span className="text-slate-300">=</span>
                    <span className={`font-mono font-bold text-sm whitespace-nowrap ${kalemToplam > 0 ? 'text-rose-600' : 'text-slate-400'}`}>
                      {formatPara(kalemToplam)}
                    </span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Toplam */}
          <div className="bg-rose-500/10 border-2 border-rose-500/30 rounded-lg p-3">
            <div className="flex justify-between items-center">
              <span className="text-sm font-bold text-rose-700 uppercase tracking-wider">Toplam Borç</span>
              <span className="font-mono font-bold text-2xl text-rose-700">{formatPara(toplam)}</span>
            </div>
          </div>

          {/* Açıklama */}
          <FormAlani label="Açıklama (opsiyonel)">
            <textarea
              value={aciklama}
              onChange={e => setAciklama(e.target.value)}
              placeholder="Araç plakası, marka/model, fatura no vb."
              rows="2"
              className="form-input resize-none"
            />
          </FormAlani>

          {/* İşlem sonrası bakiye */}
          {toplam > 0 && (
            <div className="bg-slate-100 p-2.5 rounded-lg border border-slate-200">
              <div className="flex justify-between items-center">
                <span className="text-xs text-slate-500 uppercase tracking-wider">Yeni Bakiye</span>
                <span className={`font-mono font-bold text-base ${yeniBakiye > 0 ? 'text-rose-600' : yeniBakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>
                  {formatPara(Math.abs(yeniBakiye))}
                  <span className="text-xs ml-1 font-normal">
                    {yeniBakiye > 0 ? '(borçlu)' : yeniBakiye < 0 ? '(alacaklı)' : '(kapalı)'}
                  </span>
                </span>
              </div>
            </div>
          )}
        </div>
      ) : (
        // ====================== ÖDEME MODU - TEK TUTAR ======================
        <div className="space-y-3">
          <FormAlani label="Ödenen Ürün / Hizmet (opsiyonel)">
            <input
              type="text"
              value={tekUrunAdi}
              onChange={e => setTekUrunAdi(e.target.value)}
              placeholder="Örn: Geçen haftaki akü..."
              className="form-input"
              autoFocus
            />
          </FormAlani>

          <FormAlani label="Tutar (₺) *">
            <input
              type="number"
              step="0.01"
              value={tekTutar}
              onChange={e => setTekTutar(e.target.value)}
              placeholder="0.00"
              className="form-input text-lg font-mono font-semibold"
            />
          </FormAlani>

          <FormAlani label="Açıklama (opsiyonel)">
            <textarea
              value={aciklama}
              onChange={e => setAciklama(e.target.value)}
              placeholder="Nakit, havale, kart, kısmi ödeme vb."
              rows="2"
              className="form-input resize-none"
            />
          </FormAlani>

          {toplam > 0 && (
            <div className="bg-slate-100 p-3 rounded-lg border border-slate-200">
              <p className="text-xs text-slate-500 uppercase tracking-wider mb-1">İşlem Sonrası Bakiye</p>
              <p className={`font-mono font-bold text-lg ${yeniBakiye > 0 ? 'text-rose-600' : yeniBakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>
                {formatPara(Math.abs(yeniBakiye))}
                <span className="text-xs ml-2 font-normal">
                  {yeniBakiye > 0 ? '(borçlu)' : yeniBakiye < 0 ? '(alacaklı)' : '(kapalı)'}
                </span>
              </p>
            </div>
          )}
        </div>
      )}

      {/* Butonlar */}
      <div className="flex gap-2 pt-3 mt-3 border-t border-slate-200">
        <button onClick={onKapat} className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 rounded-lg font-semibold text-sm">
          İptal
        </button>
        <button
          onClick={kaydet}
          className={`flex-1 py-2.5 rounded-lg font-semibold text-sm flex items-center justify-center gap-2 ${
            borcMu ? 'bg-rose-500 hover:bg-rose-400 text-white' : 'bg-emerald-600 hover:bg-emerald-500 text-white'
          }`}
        >
          {duzenlemeMi 
            ? <><Check className="w-4 h-4" /> Güncelle</>
            : (borcMu ? <><Plus className="w-4 h-4" /> Borç Ekle</> : <><Check className="w-4 h-4" /> Ödeme Al</>)
          }
        </button>
      </div>
    </Modal>
  );
}

function MusteriFormModal({ baslik, baslangicVerileri, onKapat, onKaydet }) {
  const [ad, setAd] = useState(baslangicVerileri?.ad || '');
  const [telefon, setTelefon] = useState(baslangicVerileri?.telefon || '');
  const [notlar, setNotlar] = useState(baslangicVerileri?.notlar || '');

  const kaydet = () => {
    if (!ad.trim()) return alert('Müşteri adı gerekli');
    onKaydet({ ad: ad.trim(), telefon: telefon.trim(), notlar: notlar.trim() });
  };

  return (
    <Modal baslik={baslik} onKapat={onKapat}>
      <div className="space-y-3">
        <FormAlani label="Müşteri Adı *">
          <input type="text" value={ad} onChange={e => setAd(e.target.value)} className="form-input" autoFocus />
        </FormAlani>
        <FormAlani label="Telefon">
          <input type="tel" value={telefon} onChange={e => setTelefon(e.target.value)} className="form-input" />
        </FormAlani>
        <FormAlani label="Notlar">
          <textarea value={notlar} onChange={e => setNotlar(e.target.value)} rows="3" className="form-input resize-none" />
        </FormAlani>
        <ModalButonlar onIptal={onKapat} onKaydet={kaydet} />
      </div>
    </Modal>
  );
}

// ============ VERESİYE ============
function VeresiyeSekmesi({ musteriler, veresiyeKayitlari, setVeresiyeKayitlari, musteriBakiyeleri, formatPara, formatTarih, yeniId }) {
  const [secilenMusteriId, setSecilenMusteriId] = useState('');
  const [modal, setModal] = useState(null);
  const [arama, setArama] = useState('');
  const [filtre, setFiltre] = useState('borclu');
  const [secimModu, setSecimModu] = useState(false);
  const [secilenKayitlar, setSecilenKayitlar] = useState(new Set());

  const musteri = musteriler.find(m => m.id === secilenMusteriId);
  const bakiye = secilenMusteriId ? (musteriBakiyeleri[secilenMusteriId] || 0) : 0;
  
  const musteriHareketleri = useMemo(() => {
    if (!secilenMusteriId) return [];
    return [...veresiyeKayitlari]
      .filter(k => k.musteriId === secilenMusteriId)
      .sort((a, b) => new Date(b.tarih) - new Date(a.tarih));
  }, [veresiyeKayitlari, secilenMusteriId]);

  const sayilar = useMemo(() => {
    let borclu = 0, alacakli = 0;
    musteriler.forEach(m => {
      const b = musteriBakiyeleri[m.id] || 0;
      if (b > 0) borclu++;
      else if (b < 0) alacakli++;
    });
    return { borclu, alacakli };
  }, [musteriler, musteriBakiyeleri]);

  const filtrelenmisMusteriler = useMemo(() => {
    let liste = [...musteriler];
    if (filtre === 'borclu') {
      liste = liste.filter(m => (musteriBakiyeleri[m.id] || 0) > 0);
    } else if (filtre === 'alacakli') {
      liste = liste.filter(m => (musteriBakiyeleri[m.id] || 0) < 0);
    }
    const a = arama.toLowerCase().trim();
    if (a) {
      liste = liste.filter(m => 
        m.ad.toLowerCase().includes(a) || 
        (m.telefon && m.telefon.includes(a))
      );
    }
    return liste.sort((a, b) => Math.abs(musteriBakiyeleri[b.id] || 0) - Math.abs(musteriBakiyeleri[a.id] || 0));
  }, [musteriler, musteriBakiyeleri, filtre, arama]);

  const kayitSil = (id) => {
    if (confirm('Bu kaydı silmek istediğinizden emin misiniz?')) {
      setVeresiyeKayitlari(veresiyeKayitlari.filter(k => k.id !== id));
    }
  };

  // TOPLU SİLME yardımcı fonksiyonları
  const kayitSecimToggle = (id) => {
    const yeni = new Set(secilenKayitlar);
    if (yeni.has(id)) yeni.delete(id);
    else yeni.add(id);
    setSecilenKayitlar(yeni);
  };

  const tumunuSec = () => {
    if (secilenKayitlar.size === musteriHareketleri.length) {
      setSecilenKayitlar(new Set());
    } else {
      setSecilenKayitlar(new Set(musteriHareketleri.map(k => k.id)));
    }
  };

  const secilenleriSil = () => {
    if (secilenKayitlar.size === 0) return;
    if (confirm(`${secilenKayitlar.size} kaydı silmek istediğinizden emin misiniz?`)) {
      setVeresiyeKayitlari(veresiyeKayitlari.filter(k => !secilenKayitlar.has(k.id)));
      setSecilenKayitlar(new Set());
      setSecimModu(false);
    }
  };

  const secimModunuKapat = () => {
    setSecimModu(false);
    setSecilenKayitlar(new Set());
  };

  // Müşteri değişince seçimleri sıfırla
  useEffect(() => {
    setSecilenKayitlar(new Set());
    setSecimModu(false);
  }, [secilenMusteriId]);

  // DETAY GÖRÜNÜMÜ
  if (secilenMusteriId && musteri) {
    return (
      <div className="space-y-4">
        <button
          onClick={() => setSecilenMusteriId('')}
          className="flex items-center gap-2 text-slate-500 hover:text-amber-600 text-sm font-medium"
        >
          ← Veresiye listesine dön
        </button>

        <div className={`rounded-xl p-5 border-2 ${bakiye > 0 ? 'bg-rose-500/5 border-rose-500/20' : bakiye < 0 ? 'bg-emerald-500/5 border-emerald-500/20' : 'bg-white border-slate-200'}`}>
          <div className="flex items-start gap-3 mb-4">
            <div className={`w-12 h-12 rounded-lg flex items-center justify-center flex-shrink-0 ${bakiye > 0 ? 'bg-rose-500/10' : bakiye < 0 ? 'bg-emerald-500/10' : 'bg-slate-100'}`}>
              <Users className={`w-6 h-6 ${bakiye > 0 ? 'text-rose-600' : bakiye < 0 ? 'text-emerald-600' : 'text-slate-400'}`} />
            </div>
            <div className="min-w-0 flex-1">
              <h2 className="text-xl font-bold tracking-tight truncate">{musteri.ad}</h2>
              {musteri.telefon && <p className="text-sm text-slate-500">{musteri.telefon}</p>}
              {musteri.notlar && <p className="text-xs text-slate-400 mt-1 line-clamp-2">{musteri.notlar}</p>}
            </div>
          </div>

          <div className="bg-white border border-slate-200 rounded-lg p-3 mb-3">
            <div className="flex items-baseline justify-between gap-2">
              <div className="min-w-0">
                <p className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">Güncel Bakiye</p>
                <p className={`text-2xl font-bold font-mono ${bakiye > 0 ? 'text-rose-600' : bakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>
                  {formatPara(Math.abs(bakiye))}
                </p>
              </div>
              <div className={`px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider whitespace-nowrap ${bakiye > 0 ? 'bg-rose-500/10 text-rose-700' : bakiye < 0 ? 'bg-emerald-500/10 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                {bakiye > 0 ? 'Borçlu' : bakiye < 0 ? 'Alacaklı' : 'Hesap Kapalı'}
              </div>
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <button
              onClick={() => setModal({tip: 'borc'})}
              className="py-3 px-3 bg-rose-500 hover:bg-rose-400 text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 shadow-sm"
            >
              <Plus className="w-4 h-4" /> Borç Ekle
            </button>
            <button
              onClick={() => setModal({tip: 'odeme'})}
              className="py-3 px-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 shadow-sm"
            >
              <Check className="w-4 h-4" /> Ödeme Al
            </button>
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
            <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Hesap Hareketleri</h3>
            <div className="flex items-center gap-2">
              <span className="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-0.5 rounded">{musteriHareketleri.length} kayıt</span>
              {musteriHareketleri.length > 0 && !secimModu && (
                <button
                  onClick={() => setSecimModu(true)}
                  className="px-2.5 py-1 bg-amber-500/10 border border-amber-500/30 text-amber-700 rounded-md text-xs font-semibold hover:bg-amber-500/20"
                >
                  ☑ Seç
                </button>
              )}
              {secimModu && (
                <button
                  onClick={secimModunuKapat}
                  className="px-2.5 py-1 bg-slate-100 border border-slate-300 text-slate-600 rounded-md text-xs font-semibold hover:bg-slate-200"
                >
                  ✕ İptal
                </button>
              )}
            </div>
          </div>

          {/* Toplu işlem barı - sadece seçim modunda */}
          {secimModu && (
            <div className="mb-3 space-y-2">
              <div className="bg-amber-50 border border-amber-300 rounded-lg p-3 flex items-center justify-between">
                <label className="flex items-center gap-2 cursor-pointer select-none">
                  <input
                    type="checkbox"
                    checked={secilenKayitlar.size === musteriHareketleri.length && musteriHareketleri.length > 0}
                    onChange={tumunuSec}
                    className="w-5 h-5 cursor-pointer accent-amber-600"
                  />
                  <span className="text-sm font-bold text-slate-900">Tümünü Seç</span>
                </label>
                <span className="text-base font-bold text-slate-900">
                  {secilenKayitlar.size} / {musteriHareketleri.length}
                </span>
              </div>
              <button
                onClick={secilenleriSil}
                disabled={secilenKayitlar.size === 0}
                style={{
                  backgroundColor: secilenKayitlar.size === 0 ? '#e2e8f0' : '#dc2626',
                  color: secilenKayitlar.size === 0 ? '#475569' : '#ffffff',
                  cursor: secilenKayitlar.size === 0 ? 'not-allowed' : 'pointer'
                }}
                className="w-full px-4 py-3 rounded-lg text-base font-bold flex items-center justify-center gap-2 transition-all shadow"
              >
                <Trash2 className="w-5 h-5" />
                {secilenKayitlar.size === 0 
                  ? 'Sileceğiniz Kayıtları Seçin'
                  : secilenKayitlar.size + ' KAYDI SİL'
                }
              </button>
            </div>
          )}

          {musteriHareketleri.length === 0 ? (
            <div className="py-8 text-center">
              <Wallet className="w-10 h-10 text-slate-200 mx-auto mb-2" />
              <p className="text-slate-500 text-sm">Henüz hareket yok</p>
              <p className="text-slate-400 text-xs mt-1">Yukarıdan borç ekleyin veya ödeme alın</p>
            </div>
          ) : (
            <div className="space-y-1.5 max-h-[500px] overflow-y-auto">
              {musteriHareketleri.map(k => {
                const secili = secilenKayitlar.has(k.id);
                return (
                  <div
                    key={k.id}
                    onClick={() => secimModu && kayitSecimToggle(k.id)}
                    className={`flex items-center gap-3 p-3 rounded-lg border transition-all ${
                      secimModu ? 'cursor-pointer' : ''
                    } ${
                      secili
                        ? 'bg-amber-500/15 border-amber-500/50'
                        : k.tip === 'borc' ? 'bg-rose-500/5 border-rose-500/10' : 'bg-emerald-500/5 border-emerald-500/10'
                    }`}
                  >
                    {secimModu && (
                      <input
                        type="checkbox"
                        checked={secili}
                        onChange={() => kayitSecimToggle(k.id)}
                        onClick={e => e.stopPropagation()}
                        className="w-5 h-5 cursor-pointer accent-amber-500 flex-shrink-0"
                      />
                    )}
                    <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 ${k.tip === 'borc' ? 'bg-rose-500/10 text-rose-600' : 'bg-emerald-500/10 text-emerald-600'}`}>
                      {k.tip === 'borc' ? <Plus className="w-4 h-4" /> : <Check className="w-4 h-4" />}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className={`text-xs font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ${k.tip === 'borc' ? 'bg-rose-500/10 text-rose-700' : 'bg-emerald-500/10 text-emerald-700'}`}>
                          {k.tip === 'borc' ? 'Borç' : 'Ödeme'}
                        </span>
                        {k.urunAdi && <span className="font-semibold text-sm truncate">{k.urunAdi}</span>}
                      </div>
                      {k.aciklama && <p className="text-xs text-slate-500 mt-0.5 truncate">{k.aciklama}</p>}
                      <p className="text-xs text-slate-400 mt-0.5">{formatTarih(k.tarih)}</p>
                    </div>
                    <div className="flex items-center gap-1 flex-shrink-0">
                      <p className={`font-mono font-bold text-base whitespace-nowrap mr-1 ${k.tip === 'borc' ? 'text-rose-600' : 'text-emerald-600'}`}>
                        {k.tip === 'borc' ? '+' : '-'}{formatPara(k.tutar)}
                      </p>
                      {!secimModu && (
                        <>
                          <button onClick={() => setModal({tip: 'duzenle', kayit: k})} className="p-1.5 text-slate-400 hover:text-amber-600 hover:bg-amber-500/10 rounded" title="Düzenle">
                            <Edit2 className="w-3.5 h-3.5" />
                          </button>
                          <button onClick={() => kayitSil(k.id)} className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-500/10 rounded" title="Sil">
                            <Trash2 className="w-3.5 h-3.5" />
                          </button>
                        </>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {modal && (
          <HizliVeresiyeModal
            tip={modal.tip === 'duzenle' ? modal.kayit.tip : modal.tip}
            musteri={musteri}
            formatPara={formatPara}
            mevcutBakiye={bakiye}
            duzenlenenKayit={modal.tip === 'duzenle' ? modal.kayit : null}
            onKapat={() => setModal(null)}
            onKaydet={(urunAdi, tutar, aciklama, kalemler) => {
              if (modal.tip === 'duzenle') {
                // Düzenleme - mevcut kaydı güncelle
                setVeresiyeKayitlari(veresiyeKayitlari.map(k => 
                  k.id === modal.kayit.id 
                    ? { ...k, tutar, urunAdi: urunAdi || '', aciklama: aciklama || '', kalemler: kalemler || null }
                    : k
                ));
              } else {
                // Yeni ekleme
                setVeresiyeKayitlari([...veresiyeKayitlari, {
                  id: yeniId(),
                  musteriId: secilenMusteriId,
                  tip: modal.tip,
                  tutar,
                  urunAdi: urunAdi || '',
                  aciklama: aciklama || '',
                  kalemler: kalemler || null,
                  tarih: new Date().toISOString()
                }]);
              }
              setModal(null);
            }}
          />
        )}
      </div>
    );
  }

  // ANA LİSTE GÖRÜNÜMÜ
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-3 gap-2">
        <button
          onClick={() => setFiltre('borclu')}
          className={`py-2.5 px-3 rounded-lg text-sm font-semibold border-2 transition-all ${filtre === 'borclu' ? 'bg-rose-500/10 border-rose-500/40 text-rose-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}
        >
          Borçlular ({sayilar.borclu})
        </button>
        <button
          onClick={() => setFiltre('alacakli')}
          className={`py-2.5 px-3 rounded-lg text-sm font-semibold border-2 transition-all ${filtre === 'alacakli' ? 'bg-emerald-500/10 border-emerald-500/40 text-emerald-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}
        >
          Alacaklılar ({sayilar.alacakli})
        </button>
        <button
          onClick={() => setFiltre('tumu')}
          className={`py-2.5 px-3 rounded-lg text-sm font-semibold border-2 transition-all ${filtre === 'tumu' ? 'bg-amber-500/10 border-amber-500/40 text-amber-700' : 'bg-white border-slate-200 text-slate-500 hover:border-slate-300'}`}
        >
          Tümü ({musteriler.length})
        </button>
      </div>

      <div className="relative">
        <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
        <input
          type="text"
          placeholder="Müşteri adı veya telefon..."
          value={arama}
          onChange={e => setArama(e.target.value)}
          className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-amber-500/50 text-sm"
        />
      </div>

      {filtrelenmisMusteriler.length === 0 ? (
        <div className="bg-white border border-slate-200 rounded-xl p-12 text-center">
          <Wallet className="w-12 h-12 text-slate-200 mx-auto mb-3" />
          <p className="text-slate-500">
            {musteriler.length === 0 ? 'Henüz müşteri yok' : 
             filtre === 'borclu' ? 'Borçlu müşteri yok' :
             filtre === 'alacakli' ? 'Alacaklı müşteri yok' :
             'Aramaya uygun müşteri bulunamadı'}
          </p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtrelenmisMusteriler.map(m => {
            const b = musteriBakiyeleri[m.id] || 0;
            return (
              <div
                key={m.id}
                onClick={() => setSecilenMusteriId(m.id)}
                role="button"
                tabIndex={0}
                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') setSecilenMusteriId(m.id); }}
                className={`bg-white border-2 rounded-xl p-4 cursor-pointer select-none transition-all ${
                  b > 0 ? 'border-rose-500/20 hover:border-rose-500/50 hover:bg-rose-500/5' : 
                  b < 0 ? 'border-emerald-500/20 hover:border-emerald-500/50 hover:bg-emerald-500/5' : 
                  'border-slate-200 hover:border-amber-500/40'

              >
                <div className="flex items-start gap-3 mb-3">
                  <div className={`w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 ${
                    b > 0 ? 'bg-rose-500/10' : b < 0 ? 'bg-emerald-500/10' : 'bg-slate-100'
                  }`}>
                    <Users className={`w-5 h-5 ${
                      b > 0 ? 'text-rose-600' : b < 0 ? 'text-emerald-600' : 'text-slate-400'
                    }`} />
                  </div>
                  <div className="min-w-0 flex-1">
                    <p className="font-semibold truncate">{m.ad}</p>
                    {m.telefon && <p className="text-xs text-slate-500 truncate">{m.telefon}</p>}
                  </div>
                </div>
                <div className="border-t border-slate-100 pt-3">
                  <div className="flex justify-between items-end">
                    <div>
                      <p className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">
                        {b > 0 ? 'Borçlu' : b < 0 ? 'Alacaklı' : 'Bakiye'}
                      </p>
                      <p className={`text-xl font-bold font-mono ${
                        b > 0 ? 'text-rose-600' : b < 0 ? 'text-emerald-600' : 'text-slate-400'
                      }`}>
                        {formatPara(Math.abs(b))}
                      </p>
                    </div>
                    <span className={`text-xs font-semibold ${
                      b > 0 ? 'text-rose-600' : b < 0 ? 'text-emerald-600' : 'text-slate-400'
                    }`}>
                      Detay →
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============ RAPORLAR ============
function RaporlarSekmesi({ hareketler, urunler, faturalar = [], tedarikciler = [], formatPara, formatTarih }) {
  const [aralik, setAralik] = useState('bugun');

  const filtrelenmis = useMemo(() => {
    const simdi = new Date();
    let baslangic;
    if (aralik === 'bugun') { baslangic = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate()); }
    else if (aralik === 'hafta') { baslangic = new Date(simdi.getTime() - 7 * 24 * 60 * 60 * 1000); }
    else if (aralik === 'ay') { baslangic = new Date(simdi.getTime() - 30 * 24 * 60 * 60 * 1000); }
    else { baslangic = new Date(0); }
    return hareketler.filter(h => new Date(h.tarih) >= baslangic);
  }, [hareketler, aralik]);

  // Aynı aralıkta fatura filtresi
  const filtreliFaturalar = useMemo(() => {
    const simdi = new Date();
    let baslangic;
    if (aralik === 'bugun') { baslangic = new Date(simdi.getFullYear(), simdi.getMonth(), simdi.getDate()); }
    else if (aralik === 'hafta') { baslangic = new Date(simdi.getTime() - 7 * 24 * 60 * 60 * 1000); }
    else if (aralik === 'ay') { baslangic = new Date(simdi.getTime() - 30 * 24 * 60 * 60 * 1000); }
    else { baslangic = new Date(0); }
    return faturalar.filter(f => new Date(f.tarih) >= baslangic);
  }, [faturalar, aralik]);

  const faturaToplam = filtreliFaturalar.reduce((s, f) => s + (f.toplam || 0), 0);
  const faturaOdenmis = filtreliFaturalar.filter(f => f.odendi).reduce((s, f) => s + (f.toplam || 0), 0);
  const faturaBorc = filtreliFaturalar.filter(f => !f.odendi).reduce((s, f) => s + (f.toplam || 0), 0);

  // Aylık dağılım (son 6 ay)
  const aylikRapor = useMemo(() => {
    const simdi = new Date();
    const aylar = [];
    for (let i = 5; i >= 0; i--) {
      const ay = new Date(simdi.getFullYear(), simdi.getMonth() - i, 1);
      const aySonu = new Date(simdi.getFullYear(), simdi.getMonth() - i + 1, 0, 23, 59, 59);
      const ayFaturalari = faturalar.filter(f => {
        const t = new Date(f.tarih);
        return t >= ay && t <= aySonu;
      });
      const aySatislari = hareketler.filter(h => {
        const t = new Date(h.tarih);
        return t >= ay && t <= aySonu && h.tip === 'cikis';
      });
      aylar.push({
        ay: ay.toLocaleDateString('tr-TR', { month: 'long', year: 'numeric' }),
        faturaSayisi: ayFaturalari.length,
        faturaToplam: ayFaturalari.reduce((s, f) => s + (f.toplam || 0), 0),
        faturaBorc: ayFaturalari.filter(f => !f.odendi).reduce((s, f) => s + (f.toplam || 0), 0),
        satisToplam: aySatislari.reduce((s, h) => s + h.adet * h.satisFiyati, 0),
        satisSayisi: aySatislari.length
      });
    }
    return aylar;
  }, [faturalar, hareketler]);

  // Tedarikçi bazlı toplam
  const tedarikciToplam = useMemo(() => {
    const sayim = {};
    faturalar.forEach(f => {
      if (!sayim[f.tedarikciAdi]) sayim[f.tedarikciAdi] = { ad: f.tedarikciAdi, sayi: 0, toplam: 0, borc: 0 };
      sayim[f.tedarikciAdi].sayi++;
      sayim[f.tedarikciAdi].toplam += f.toplam || 0;
      if (!f.odendi) sayim[f.tedarikciAdi].borc += f.toplam || 0;
    });
    return Object.values(sayim).sort((a, b) => b.toplam - a.toplam);
  }, [faturalar]);

  const cikislar = filtrelenmis.filter(h => h.tip === 'cikis');
  const girisler = filtrelenmis.filter(h => h.tip === 'giris');
  
  const toplamSatis = cikislar.reduce((t, h) => t + h.adet * h.satisFiyati, 0);
  const toplamGirisDegeri = girisler.reduce((t, h) => t + h.adet * h.alisFiyati, 0);

  const enCokSatanlar = useMemo(() => {
    const sayim = {};
    cikislar.forEach(h => {
      if (!sayim[h.urunId]) sayim[h.urunId] = { ad: h.urunAdi, adet: 0, tutar: 0 };
      sayim[h.urunId].adet += h.adet;
      sayim[h.urunId].tutar += h.adet * h.satisFiyati;
    });
    return Object.values(sayim).sort((a, b) => b.adet - a.adet).slice(0, 10);
  }, [cikislar]);

  return (
    <div className="space-y-5">
      <div className="flex flex-wrap gap-2">
        {[
          { id: 'bugun', isim: 'Bugün' },
          { id: 'hafta', isim: 'Son 7 Gün' },
          { id: 'ay', isim: 'Son 30 Gün' },
          { id: 'tumu', isim: 'Tümü' },
        ].map(a => (
          <button
            key={a.id}
            onClick={() => setAralik(a.id)}
            className={`px-4 py-2 rounded-lg text-sm font-semibold border ${aralik === a.id ? 'bg-amber-500 text-slate-900 border-amber-500' : 'bg-white border-slate-200 text-slate-700'}`}
          >
            {a.isim}
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KartIstatistik renk="amber" baslik="Toplam Satış" deger={formatPara(toplamSatis)} altYazi={`${cikislar.length} işlem`} icon={TrendingUp} />
        <KartIstatistik renk="emerald" baslik="Stok Girişi" deger={formatPara(toplamGirisDegeri)} altYazi={`${girisler.length} işlem`} icon={ArrowDownCircle} />
        <KartIstatistik renk="rose" baslik="Satılan Adet" deger={cikislar.reduce((t, h) => t + h.adet, 0).toString()} altYazi="ürün" icon={Package} />
        <KartIstatistik renk="orange" baslik="Aktif Ürün" deger={urunler.length.toString()} altYazi="çeşit" icon={Package} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">En Çok Satanlar</h3>
          {enCokSatanlar.length === 0 ? (
            <p className="text-slate-500 text-sm py-8 text-center">Bu aralıkta satış yok</p>
          ) : (
            <div className="space-y-2">
              {enCokSatanlar.map((u, i) => (
                <div key={i} className="flex items-center gap-3 p-2.5 bg-slate-100 rounded-lg">
                  <span className="w-6 h-6 bg-amber-500/10 text-amber-600 rounded text-xs font-bold flex items-center justify-center font-mono">{i + 1}</span>
                  <div className="flex-1 min-w-0">
                    <p className="font-medium text-sm truncate">{u.ad}</p>
                    <p className="text-xs text-slate-500">{u.adet} adet</p>
                  </div>
                  <p className="font-mono font-semibold text-sm">{formatPara(u.tutar)}</p>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Son İşlemler</h3>
          {filtrelenmis.length === 0 ? (
            <p className="text-slate-500 text-sm py-8 text-center">İşlem yok</p>
          ) : (
            <div className="space-y-2 max-h-96 overflow-y-auto">
              {[...filtrelenmis].sort((a, b) => new Date(b.tarih) - new Date(a.tarih)).slice(0, 50).map(h => (
                <div key={h.id} className="flex items-center gap-3 p-2.5 bg-slate-100 rounded-lg text-sm">
                  {h.tip === 'cikis' ? <ArrowUpCircle className="w-4 h-4 text-rose-600 flex-shrink-0" /> : <ArrowDownCircle className="w-4 h-4 text-emerald-600 flex-shrink-0" />}
                  <div className="flex-1 min-w-0">
                    <p className="truncate">{h.urunAdi}</p>
                    <p className="text-xs text-slate-500">{formatTarih(h.tarih)}</p>
                  </div>
                  <span className="font-mono">{h.adet}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* FATURA RAPORLARI - YENİ */}
      <div style={{borderColor:'#3b82f6'}} className="bg-blue-50 border-2 rounded-xl p-5">
        <h3 className="text-base font-bold text-blue-900 uppercase tracking-wider mb-3 flex items-center gap-2">
          <Receipt className="w-5 h-5" /> Fatura Raporları
        </h3>
        
        {/* Üst Özet */}
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <div className="bg-white rounded-lg p-3">
            <div className="text-xs text-slate-500 mb-1">Fatura Sayısı</div>
            <div className="text-xl font-bold text-slate-900">{filtreliFaturalar.length}</div>
          </div>
          <div className="bg-white rounded-lg p-3">
            <div className="text-xs text-slate-500 mb-1">Toplam</div>
            <div className="text-lg font-bold text-slate-900">{formatPara(faturaToplam)}</div>
          </div>
          <div className="bg-white rounded-lg p-3" style={{borderLeft:'4px solid #16a34a'}}>
            <div className="text-xs text-green-700 mb-1">Ödendi</div>
            <div className="text-lg font-bold text-green-700">{formatPara(faturaOdenmis)}</div>
          </div>
          <div className="bg-white rounded-lg p-3" style={{borderLeft:'4px solid #dc2626'}}>
            <div className="text-xs text-red-700 mb-1">Ödenecek</div>
            <div className="text-lg font-bold text-red-700">{formatPara(faturaBorc)}</div>
          </div>
        </div>

        {/* Tedarikçi Bazlı */}
        {tedarikciToplam.length > 0 && (
          <div className="bg-white rounded-lg p-3 mb-4">
            <h4 className="text-sm font-semibold text-slate-700 mb-2">Tedarikçi Bazlı Toplam</h4>
            <div className="space-y-1.5 max-h-60 overflow-y-auto">
              {tedarikciToplam.map((t, i) => (
                <div key={i} className="flex items-center justify-between gap-2 py-1.5 border-b border-slate-100 last:border-0">
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm text-slate-900 truncate">{t.ad}</div>
                    <div className="text-xs text-slate-500">{t.sayi} fatura</div>
                  </div>
                  <div className="text-right">
                    <div className="font-bold text-sm text-slate-900">{formatPara(t.toplam)}</div>
                    {t.borc > 0 && (
                      <div style={{color:'#dc2626'}} className="text-xs font-semibold">
                        Borç: {formatPara(t.borc)}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Aylık Karşılaştırma */}
        <div className="bg-white rounded-lg p-3">
          <h4 className="text-sm font-semibold text-slate-700 mb-2">Son 6 Aylık Karşılaştırma</h4>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="border-b border-slate-200">
                  <th className="text-left py-2 px-1">Ay</th>
                  <th className="text-right py-2 px-1">Fatura</th>
                  <th className="text-right py-2 px-1">Satış</th>
                  <th className="text-right py-2 px-1" style={{color:'#dc2626'}}>Borç</th>
                </tr>
              </thead>
              <tbody>
                {aylikRapor.map((a, i) => {
                  const kar = a.satisToplam - a.faturaToplam;
                  return (
                    <tr key={i} className="border-b border-slate-100">
                      <td className="py-2 px-1 font-semibold capitalize">{a.ay}</td>
                      <td className="py-2 px-1 text-right">
                        <div>{formatPara(a.faturaToplam)}</div>
                        <div className="text-slate-500">{a.faturaSayisi} fatura</div>
                      </td>
                      <td className="py-2 px-1 text-right">
                        <div>{formatPara(a.satisToplam)}</div>
                        <div className="text-slate-500">{a.satisSayisi} satış</div>
                      </td>
                      <td className="py-2 px-1 text-right" style={{color: a.faturaBorc > 0 ? '#dc2626' : '#9ca3af'}}>
                        {a.faturaBorc > 0 ? formatPara(a.faturaBorc) : '-'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============ AYARLAR ============
function AyarlarSekmesi({ ayarlar, setAyarlar, urunler, setUrunler }) {
  const [dukkanAdi, setDukkanAdi] = useState(ayarlar.dukkanAdi);
  const [esik, setEsik] = useState(ayarlar.dusukStokEsigi.toString());
  
  // Parola değiştirme alanları
  const [mevcutSifre, setMevcutSifre] = useState('');
  const [yeniSifre, setYeniSifre] = useState('');
  const [yeniSifreTekrar, setYeniSifreTekrar] = useState('');

  // Fotoğraf bilgileri
  const fotografliUrunSayisi = urunler?.filter(u => 
    (u.fotolar && u.fotolar.length > 0) || u.foto
  ).length || 0;
  
  const toplamFotoSayisi = urunler?.reduce((sayim, u) => {
    if (u.fotolar?.length) return sayim + u.fotolar.length;
    if (u.foto) return sayim + 1;
    return sayim;
  }, 0) || 0;

  const tumFotograflariSil = () => {
    if (fotografliUrunSayisi === 0) {
      return alert('Hiç fotoğraflı ürün yok');
    }
    const onay = confirm(
      `DİKKAT!\n\n${fotografliUrunSayisi} ürünün toplam ${toplamFotoSayisi} fotoğrafı silinecek.\n\nÜrünler ve diğer bilgiler kaybolmayacak, sadece fotoğraflar silinir.\n\nDevam etmek istiyor musunuz?`
    );
    if (!onay) return;
    
    const guncel = urunler.map(u => ({
      ...u,
      fotolar: [],
      foto: ''
    }));
    setUrunler(guncel);
    alert(`Başarılı! ${toplamFotoSayisi} fotoğraf silindi. Artık yeni veri ekleyebilirsiniz.`);
  };

  const kaydet = () => {
    setAyarlar({
      ...ayarlar,
      dukkanAdi: dukkanAdi.trim() || 'Oto Elektrik',
      dusukStokEsigi: parseInt(esik) || 5
    });
    alert('Ayarlar kaydedildi');
  };

  const parolaDegistir = () => {
    if (ayarlar.parola && eskiParola !== ayarlar.parola) {
      return alert('Eski parola hatalı');
    }
    if (!yeniParola) {
      return alert('Yeni parola boş olamaz');
    }
    if (yeniParola.length < 4) {
      return alert('Parola en az 4 karakter olmalı');
    }
    if (yeniParola !== yeniParolaTekrar) {
      return alert('Yeni parolalar eşleşmiyor');
    }
    setAyarlar({ ...ayarlar, parola: yeniParola });
    setEskiParola('');
    setYeniParola('');
    setYeniParolaTekrar('');
    alert('Parola başarıyla değiştirildi');
  };

  const parolayiKaldir = () => {
    if (!confirm('Parola korumasını kaldırmak istediğinize emin misiniz? Uygulamaya artık herkes erişebilir.')) return;
    if (ayarlar.parola && eskiParola !== ayarlar.parola) {
      return alert('Önce mevcut parolanızı eski parola alanına yazın');
    }
    setAyarlar({ ...ayarlar, parola: '' });
    setEskiParola('');
    setYeniParola('');
    setYeniParolaTekrar('');
    alert('Parola koruması kaldırıldı. Bir sonraki açılışta giriş ekranı görünmeyecek.');
  };

  const verileriDisaAktar = async () => {
    try {
      const tum = {};
      for (const anahtar of ['urunler', 'musteriler', 'hareketler', 'veresiye', 'ayarlar']) {
        try {
          const r = await window.storage.get(anahtar);
          if (r) tum[anahtar] = JSON.parse(r.value);
        } catch {}
      }
      const blob = new Blob([JSON.stringify(tum, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `yedek-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('Yedekleme hatası: ' + e.message);
    }
  };

  return (
    <div className="max-w-2xl space-y-5">
      <div className="bg-white border border-slate-200 rounded-xl p-5">
        <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Genel Ayarlar</h3>
        <div className="space-y-3">
          <FormAlani label="Dükkan Adı">
            <input type="text" value={dukkanAdi} onChange={e => setDukkanAdi(e.target.value)} className="form-input" />
          </FormAlani>
          <FormAlani label="Düşük Stok Uyarı Eşiği">
            <input type="number" value={esik} onChange={e => setEsik(e.target.value)} className="form-input" />
            <p className="text-xs text-slate-500 mt-1">Bu sayıya eşit veya altındaki stoklar uyarı verir</p>
          </FormAlani>
          <button onClick={kaydet} className="px-4 py-2 bg-amber-500 text-slate-900 rounded-lg font-semibold text-sm hover:bg-amber-400">
            Kaydet
          </button>
        </div>
      </div>

      {/* Toplu İçe Aktarma */}
      <div style={{borderColor:'#16a34a'}} className="bg-green-50 border-2 rounded-xl p-5">
        <h3 style={{color:'#15803d'}} className="text-sm font-semibold uppercase tracking-wider mb-2 flex items-center gap-2">
          📦 Toplu Ürün İçe Aktar
        </h3>
        <p className="text-sm text-slate-700 mb-3">
          JSON dosyasından <b>çok sayıda ürünü tek seferde stoğa ekleyebilirsin</b>. 
          Mevcut ürün varsa <b>stoğu artırır</b>, yoksa yeni ürün olarak ekler.
        </p>
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-3">
          <p className="text-xs text-amber-900">
            ⚠️ <b>Dikkat:</b> İçe aktarmadan önce <b>yedek alın</b> (Ayarlar → "Excel Yedek İndir"). 
            Yanlış dosya seçerseniz veriler bozulabilir.
          </p>
        </div>
        <label style={{backgroundColor:'#16a34a', color:'white'}} className="px-4 py-2 rounded-lg font-semibold text-sm cursor-pointer inline-block hover:opacity-90">
          📂 JSON Dosyası Seç ve Ekle
          <input 
            type="file" 
            accept=".json"
            onChange={async (e) => {
              const dosya = e.target.files[0];
              if (!dosya) return;
              try {
                const metin = await dosya.text();
                const yeniUrunler = JSON.parse(metin);
                if (!Array.isArray(yeniUrunler)) {
                  alert('❌ Dosya formatı yanlış! JSON listesi olmalı.');
                  return;
                }
                
                let eklenen = 0;
                let artirilan = 0;
                const guncel = [...urunler];
                const eslemeler = [];
                
                yeniUrunler.forEach(yeni => {
                  if (!yeni.kod || !yeni.kod.trim()) return;
                  const yeniKod = yeni.kod.trim().toLowerCase();
                  
                  // Sadece TAM ve DOLU kod eşleşmesi (boş eşleşmesin)
                  const mevcut = guncel.find(u => {
                    const uKod = (u.kod || '').trim().toLowerCase();
                    return uKod && uKod === yeniKod;  // İkisi de dolu ve eşit olmalı
                  });
                  
                  if (mevcut) {
                    mevcut.stok = (mevcut.stok || 0) + (yeni.stok || 0);
                    eslemeler.push(`${yeni.kod} → mevcut '${mevcut.kod}' (${mevcut.ad || 'adsız'})`);
                    artirilan++;
                  } else {
                    guncel.push({
                      id: yeni.id || (Date.now().toString(36) + Math.random().toString(36).slice(2, 7)),
                      kod: yeni.kod.trim(),
                      ad: yeni.ad || '',
                      kategori: yeni.kategori || '',
                      barkod: yeni.barkod || '',
                      stok: yeni.stok || 0,
                      alisFiyati: yeni.alisFiyati || 0,
                      satisFiyati: yeni.satisFiyati || 0,
                      fotolar: yeni.fotolar || [],
                      foto: yeni.foto || '',
                      eklenmeTarihi: yeni.eklenmeTarihi || new Date().toISOString()
                    });
                    eklenen++;
                  }
                });
                
                let mesaj = `📦 İçe Aktarma Özeti:\n\n✅ Yeni eklenecek: ${eklenen} ürün\n📊 Stok artırılacak: ${artirilan} ürün\n\n`;

                }
                mesaj += "Onaylıyor musunuz?";
                
                if (!confirm(mesaj)) {
                  e.target.value = '';
                  return;
                }
                
                setUrunler(guncel);
                alert(`✅ Başarılı!\n\n${eklenen} yeni ürün eklendi\n${artirilan} ürünün stoğu artırıldı`);
                e.target.value = '';
              } catch (err) {

            }}
            className="hidden"
          />
