function scriptYukle(urls, geriCagri) {
  var indeks = 0;
  function dene() {
    if (indeks >= urls.length) {
      document.getElementById('yukleme').innerHTML = 
        '<div style="text-align:center;padding:20px;color:#dc2626;max-width:400px;">' +
        '<div style="font-size:1.3rem;margin-bottom:15px;">Kutuphaneler Yuklenemedi</div>' +

      return;
    }
    var s = document.createElement('script');
    s.src = urls[indeks];
    s.onload = geriCagri;
    s.onerror = function() { indeks++; dene(); };

  }

}

// Bir fotoğrafı Cloudinary'e yükler, URL döndürür
async function cloudinaryYukle(base64Veri) {
  const formData = new FormData();
  formData.append("file", base64Veri);
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  
  const yanit = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
    { method: "POST", body: formData }
  );
  
  if (!yanit.ok) {
    throw new Error("Cloudinary yükleme hatası: " + yanit.status);
  }
  
  const sonuc = await yanit.json();
  return sonuc.secure_url;
}

window.storage = {
  get: async (anahtar) => {
    try {
      const doc = await koleksiyon.doc(anahtar).get();
      if (!doc.exists) return null;
      return { key: anahtar, value: doc.data().value };
    } catch (e) {
      const v = localStorage.getItem(anahtar);
      return v === null ? null : { key: anahtar, value: v };
    }
  },
  set: async (anahtar, deger) => {
    try {
      // Veri boyutunu kontrol et - Firebase 1MB sınırı
      // Fotoğraflar artık Cloudinary'de saklanıyor, sadece URL'ler kayıt
      const boyut = new Blob([deger]).size;
      if (boyut > 900000) {
        alert("HATA: Veri Firebase sınırına yaklaştı (" + Math.round(boyut/1024) + " KB). Eski verileri silin.");
        throw new Error("Veri çok büyük");
      }
      await koleksiyon.doc(anahtar).set({ value: deger, guncelleme: Date.now() });
      localStorage.setItem(anahtar, deger);
      return { key: anahtar, value: deger };
    } catch (e) {
      console.error("Firebase kayıt hatası:", e);
      localStorage.setItem(anahtar, deger);
      return { key: anahtar, value: deger };
    }
  },
  delete: async (anahtar) => {
    try {
      await koleksiyon.doc(anahtar).delete();
      localStorage.removeItem(anahtar);
      return { key: anahtar, deleted: true };
    } catch (e) {
      localStorage.removeItem(anahtar);
      return { key: anahtar, deleted: true };
    }
  },
  list: async (onek) => {
    try {
      const snap = await koleksiyon.get();
      const keys = [];
      snap.forEach(doc => { if (!onek || doc.id.startsWith(onek)) keys.push(doc.id); });
      return { keys };
    } catch (e) { return { keys: [] }; }
  }
};

function formatPara(sayi) {

}
function formatTarih(iso) {
  return new Date(iso).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });

// E-posta yedek gonderme fonksiyonu (window'a baglanir, her yerden cagrilabilir)
window.eposiyaYedekGonder = async function() {
  try {
    if (!window.emailjs) {
      return { basari: false, mesaj: "E-posta servisi yuklenmedi" };
    }

    // Verileri Firebase'den oku
    const musterilerDoc = await window.storage.get('musteriler');
    const veresiyeDoc = await window.storage.get('veresiye');
    
    const musteriler = musterilerDoc ? JSON.parse(musterilerDoc.value) : [];
    const veresiyeKayitlari = veresiyeDoc ? JSON.parse(veresiyeDoc.value) : [];

    // Bakiyeleri hesapla
    const bakiyeler = {};
    musteriler.forEach(m => bakiyeler[m.id] = 0);
    veresiyeKayitlari.forEach(k => {
      if (bakiyeler[k.musteriId] === undefined) bakiyeler[k.musteriId] = 0;
      bakiyeler[k.musteriId] += k.tip === 'borc' ? k.tutar : -k.tutar;
    });

    const toplamAlacak = Object.values(bakiyeler).reduce((t, b) => t + Math.max(0, b), 0);
    const tarih = new Date().toLocaleDateString('tr-TR');

    // Veresiye detay metnini olustur
    let detay = "";
    const borclular = musteriler
      .map(m => ({ ...m, bakiye: bakiyeler[m.id] || 0 }))
      .filter(m => m.bakiye !== 0)
      .sort((a, b) => b.bakiye - a.bakiye);

    if (borclular.length === 0) {
      detay = "Borclu/alacakli musteri yok.";
    } else {
      borclular.forEach(m => {
        const durum = m.bakiye > 0 ? "Borclu" : "Alacakli";
        detay += "----------------------------------------\n";
        detay += "Musteri: " + m.ad + "\n";
        if (m.telefon) detay += "Telefon: " + m.telefon + "\n";
        detay += "Durum: " + durum + "\n";
        detay += "Tutar: " + formatPara(Math.abs(m.bakiye)) + "\n";
        
        // Son 3 hareketi ekle
        const hareketleri = veresiyeKayitlari
          .filter(k => k.musteriId === m.id)
          .sort((a, b) => new Date(b.tarih) - new Date(a.tarih))
          .slice(0, 3);
        
        if (hareketleri.length > 0) {
          detay += "Son hareketler:\n";
          hareketleri.forEach(h => {
            const tip = h.tip === 'borc' ? '+' : '-';
            const urun = h.urunAdi ? " (" + h.urunAdi + ")" : "";
            detay += "  " + tip + formatPara(h.tutar) + urun + " - " + formatTarih(h.tarih) + "\n";
          });
        }
      });
      detay += "----------------------------------------\n";
      detay += "TOPLAM ALACAK: " + formatPara(toplamAlacak);
    }

    // E-posta gonder
    const params = {
      to_email: EMAILJS_CONFIG.hedefEposta,
      email: EMAILJS_CONFIG.hedefEposta,
      tarih: tarih,
      musteri_sayisi: musteriler.length.toString(),
      toplam_alacak: formatPara(toplamAlacak),
      veresiye_detay: detay,
      name: "Stok Veresiye Yedek",
      time: new Date().toLocaleString('tr-TR'),
      message: detay
    };

    await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, params);
    
    // Son gonderim tarihini kaydet
    localStorage.setItem('son_eposta_yedek', new Date().toDateString());
    
    return { 
      basari: true, 
      mesaj: musteriler.length + " musteri, " + formatPara(toplamAlacak) + " alacak yedeklendi." 
    };
  } catch (e) {
    console.error("E-posta hatasi:", e);
    return { basari: false, mesaj: e.message || e.text || "Bilinmeyen hata" };
  }
};

// PC için otomatik Excel yedek indirme fonksiyonu
window.excelYedekIndir = async function() {
  try {
    // Firebase'den tum verileri cek
    const koleksiyon = db.collection('uygulama_verileri');
    const veriler = {};
    const docs = await koleksiyon.get();
    docs.forEach(doc => {
      try {
        veriler[doc.id] = JSON.parse(doc.data().value);
      } catch (e) {
        veriler[doc.id] = doc.data().value;
      }
    });

    // SheetJS yukle (eger yuklenmemisse)
    if (!window.XLSX) {
      console.log("SheetJS yukleniyor...");
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js';
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    const wb = XLSX.utils.book_new();
    const tarihStr = new Date().toLocaleString('tr-TR');

    // 1. URUNLER SAYFASI
    const urunler = veriler.urunler || [];
    if (urunler.length > 0) {
      const urunRows = urunler.map(u => ({
        'Parca Kodu': u.parcaKodu || '',
        'Urun Adi': u.urunAdi || '',
        'Kategori': u.kategori || '',
        'Barkod': u.barkod || '',
        'Stok': u.stok || 0,
        'Alis (TL)': u.alisFiyat || 0,
        'Satis (TL)': u.satisFiyat || 0,
        'Eklenme': u.eklenmeTarihi ? new Date(u.eklenmeTarihi).toLocaleDateString('tr-TR') : ''
      }));
      const ws1 = XLSX.utils.json_to_sheet(urunRows);
      ws1['!cols'] = [{wch:15},{wch:30},{wch:15},{wch:15},{wch:8},{wch:12},{wch:12},{wch:12}];
      XLSX.utils.book_append_sheet(wb, ws1, 'Urunler');
    }

    // 2. MUSTERILER SAYFASI
    const musteriler = veriler.musteriler || [];
    const veresiye = veriler.veresiye || [];
    if (musteriler.length > 0) {
      const musteriRows = musteriler.map(m => {
        const kayitlari = veresiye.filter(k => k.musteriId === m.id);
        const borc = kayitlari.filter(k => k.tip === 'borc').reduce((s, k) => s + k.tutar, 0);
        const odeme = kayitlari.filter(k => k.tip === 'odeme').reduce((s, k) => s + k.tutar, 0);
        return {
          'Musteri Adi': m.ad || '',
          'Telefon': m.telefon || '',
          'Toplam Borc (TL)': borc,
          'Toplam Odeme (TL)': odeme,
          'Bakiye (TL)': borc - odeme
        };
      });
      const ws2 = XLSX.utils.json_to_sheet(musteriRows);
      ws2['!cols'] = [{wch:25},{wch:15},{wch:15},{wch:15},{wch:15}];
      XLSX.utils.book_append_sheet(wb, ws2, 'Musteriler');
    }

    // 3. VERESIYE HAREKETLERI SAYFASI
    if (veresiye.length > 0) {
      const hareketRows = veresiye.map(k => {
        const m = musteriler.find(x => x.id === k.musteriId);
        return {
          'Tarih': new Date(k.tarih).toLocaleString('tr-TR'),
          'Musteri': m?.ad || 'Bilinmiyor',
          'Tip': k.tip === 'borc' ? 'BORC' : 'ODEME',
          'Tutar (TL)': k.tutar,
          'Aciklama': k.urunAdi || k.aciklama || ''
        };
      });
      const ws3 = XLSX.utils.json_to_sheet(hareketRows);
      ws3['!cols'] = [{wch:18},{wch:25},{wch:8},{wch:12},{wch:40}];
      XLSX.utils.book_append_sheet(wb, ws3, 'Veresiye Hareketleri');
    }

    // 4. SATISLAR SAYFASI
    const hareketler = veriler.hareketler || [];
    if (hareketler.length > 0) {
      const satisRows = hareketler.map(h => ({
        'Tarih': new Date(h.tarih).toLocaleString('tr-TR'),
        'Urun': h.urunAdi || '',
        'Adet': h.adet || 0,
        'Birim Fiyat': h.birimFiyat || 0,
        'Toplam (TL)': (h.adet || 0) * (h.birimFiyat || 0)
      }));
      const ws4 = XLSX.utils.json_to_sheet(satisRows);
      ws4['!cols'] = [{wch:18},{wch:30},{wch:8},{wch:12},{wch:12}];
      XLSX.utils.book_append_sheet(wb, ws4, 'Satislar');
    }

    // Dosyayi indir
    const tarih = new Date().toISOString().slice(0, 10);
    const dosyaAdi = `yedek-${tarih}.xlsx`;
    XLSX.writeFile(wb, dosyaAdi);
    
    console.log("✅ Excel yedek indirildi:", dosyaAdi);
    return { basari: true, dosya: dosyaAdi };
  } catch (e) {
    console.error("Excel yedek hatasi:", e);
    return { basari: false, mesaj: e.message };
  }
};

function StokVeresiyeUygulamasi() {
  const [aktifSekme, setAktifSekme] = useState('panel');
  const [yukleniyor, setYukleniyor] = useState(true);
  const [urunler, setUrunler] = useState([]);
  const [musteriler, setMusteriler] = useState([]);
  const [hareketler, setHareketler] = useState([]);
  const [veresiyeKayitlari, setVeresiyeKayitlari] = useState([]);
  const [faturalar, setFaturalar] = useState([]);
  const [tedarikciler, setTedarikciler] = useState([]);
  const [ayarlar, setAyarlar] = useState({ dukkanAdi: 'Oto Elektrik', dusukStokEsigi: 5, parola: 'onur12345' });
  const [girisYapildi, setGirisYapildi] = useState(() => {
    // Daha önce giris yapildiysa otomatik gir
    return localStorage.getItem('giris_yapildi') === 'evet';
  });

  // Verileri yükle
  useEffect(() => {
    async function yukle() {
      try {
        const sonuclar = await Promise.all([
          window.storage.get('urunler').catch(() => null),
          window.storage.get('musteriler').catch(() => null),
          window.storage.get('hareketler').catch(() => null),
          window.storage.get('veresiye').catch(() => null),
          window.storage.get('ayarlar').catch(() => null),
          window.storage.get('faturalar').catch(() => null),
          window.storage.get('tedarikciler').catch(() => null),
        ]);
        if (sonuclar[0]) setUrunler(JSON.parse(sonuclar[0].value));
        if (sonuclar[1]) setMusteriler(JSON.parse(sonuclar[1].value));
        if (sonuclar[2]) setHareketler(JSON.parse(sonuclar[2].value));
        if (sonuclar[3]) setVeresiyeKayitlari(JSON.parse(sonuclar[3].value));
        if (sonuclar[4]) setAyarlar(JSON.parse(sonuclar[4].value));
        if (sonuclar[5]) setFaturalar(JSON.parse(sonuclar[5].value));
        if (sonuclar[6]) setTedarikciler(JSON.parse(sonuclar[6].value));
      } catch (e) {
        console.error(e);
      }
      setYukleniyor(false);
    }
    yukle();
  }, []);

  // Veri kaydetme yardımcıları
  const kaydet = async (anahtar, veri) => {
    try {
      await window.storage.set(anahtar, JSON.stringify(veri));
    } catch (e) {
      console.error('Kaydetme hatası:', e);
    }
  };

  useEffect(() => { if (!yukleniyor) kaydet('urunler', urunler); }, [urunler, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('musteriler', musteriler); }, [musteriler, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('hareketler', hareketler); }, [hareketler, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('veresiye', veresiyeKayitlari); }, [veresiyeKayitlari, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('ayarlar', ayarlar); }, [ayarlar, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('faturalar', faturalar); }, [faturalar, yukleniyor]);
  useEffect(() => { if (!yukleniyor) kaydet('tedarikciler', tedarikciler); }, [tedarikciler, yukleniyor]);

  // Yardımcı fonksiyonlar
  const formatPara = (sayi) => new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(sayi || 0) + ' ₺';
  const formatTarih = (iso) => new Date(iso).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  const yeniId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

  // Hesaplamalar
  const dusukStoklar = useMemo(() => urunler.filter(u => u.stok <= ayarlar.dusukStokEsigi), [urunler, ayarlar.dusukStokEsigi]);
  const toplamStokDegeri = useMemo(() => urunler.reduce((t, u) => t + (u.stok * u.alisFiyati), 0), [urunler]);
  
  const musteriBakiyeleri = useMemo(() => {
    const bakiyeler = {};
    musteriler.forEach(m => bakiyeler[m.id] = 0);
    veresiyeKayitlari.forEach(k => {
      if (bakiyeler[k.musteriId] === undefined) bakiyeler[k.musteriId] = 0;
      bakiyeler[k.musteriId] += k.tip === 'borc' ? k.tutar : -k.tutar;
    });
    return bakiyeler;
  }, [musteriler, veresiyeKayitlari]);

  const toplamAlacak = useMemo(() => Object.values(musteriBakiyeleri).reduce((t, b) => t + Math.max(0, b), 0), [musteriBakiyeleri]);

  const bugunSatis = useMemo(() => {
    const bugun = new Date().toDateString();
    return hareketler
      .filter(h => h.tip === 'cikis' && new Date(h.tarih).toDateString() === bugun)
      .reduce((t, h) => t + (h.adet * h.satisFiyati), 0);
  }, [hareketler]);

  if (yukleniyor) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center">
        <div className="text-amber-600 text-lg font-mono">Yükleniyor...</div>
      </div>
    );
  }

  // Parola - Ayarlardan değiştirilebilir
  const dogruParola = ayarlar.parola || 'onur12345';
  if (!girisYapildi) {
    return (
      <GirisEkrani
        dukkanAdi={ayarlar.dukkanAdi}
        dogruParola={dogruParola}
        onGiris={() => {
          localStorage.setItem('giris_yapildi', 'evet');
          setGirisYapildi(true);
        }}
      />
    );
  }

  const sekmeler = [
    { id: 'panel', isim: 'Panel', icon: TrendingUp },
    { id: 'urunler', isim: 'Stok', icon: Package },
    { id: 'satis', isim: 'Satış', icon: Zap },
    { id: 'musteriler', isim: 'Müşteriler', icon: Users },
    { id: 'veresiye', isim: 'Veresiye', icon: Wallet },
    { id: 'faturalar', isim: 'Faturalar', icon: Receipt },
    { id: 'raporlar', isim: 'Raporlar', icon: FileText },
    { id: 'ayarlar', isim: 'Ayarlar', icon: Settings },
  ];

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900" style={{ fontFamily: "'Inter', system-ui, sans-serif" }}>
      {/* Üst Bar */}
      <header className="border-b border-slate-200 bg-white backdrop-blur sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center">
              <Zap className="w-6 h-6 text-slate-900" strokeWidth={2.5} />
            </div>
            <div>
              <h1 className="text-lg font-bold tracking-tight">{ayarlar.dukkanAdi}</h1>
              <p className="text-xs text-slate-500 font-mono">STOK & VERESİYE SİSTEMİ</p>
            </div>
          </div>
          <div className="flex items-center gap-2">
            {dusukStoklar.length > 0 && (
              <button onClick={() => setAktifSekme('urunler')} className="flex items-center gap-2 px-3 py-2 bg-red-950/50 border border-red-800 rounded-lg text-red-700 text-sm hover:bg-red-950">
                <AlertTriangle className="w-4 h-4" />
                <span className="hidden sm:inline">{dusukStoklar.length} ürün düşük stokta</span>
                <span className="sm:hidden">{dusukStoklar.length}</span>
              </button>
            )}
            <button
              onClick={() => {
                if (confirm('Çıkış yapmak istediğinize emin misiniz? Bir sonraki açılışta şifre sorulacak.')) {
                  localStorage.removeItem('giris_yapildi');
                  setGirisYapildi(false);
                }
              }}
              className="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-700"
              title="Çıkış Yap"
            >
              <Lock className="w-4 h-4" />
            </button>
          </div>
        </div>
      </header>

      {/* Sekme Menüsü */}
      <nav className="border-b border-slate-200 bg-slate-50 sticky top-[65px] z-30">
        <div className="max-w-7xl mx-auto px-2 flex overflow-x-auto scrollbar-hide">
          {sekmeler.map(s => {
            const Icon = s.icon;
            const aktif = aktifSekme === s.id;
            return (
              <button
                key={s.id}
                onClick={() => setAktifSekme(s.id)}
                className={`flex items-center gap-2 px-4 py-3 text-sm font-medium whitespace-nowrap border-b-2 transition-colors ${
                  aktif ? 'border-amber-500 text-amber-600' : 'border-transparent text-slate-500 hover:text-slate-800'
                }`}
              >
                <Icon className="w-4 h-4" />
                {s.isim}
              </button>
            );
          })}
        </div>
      </nav>

      <main className="max-w-7xl mx-auto px-4 py-6">
        {aktifSekme === 'panel' && (
          <Panel
            urunler={urunler}
            musteriler={musteriler}
            dusukStoklar={dusukStoklar}
            toplamStokDegeri={toplamStokDegeri}
            toplamAlacak={toplamAlacak}
            bugunSatis={bugunSatis}
            hareketler={hareketler}
            musteriBakiyeleri={musteriBakiyeleri}
            formatPara={formatPara}
            formatTarih={formatTarih}
          />
        )}
        {aktifSekme === 'urunler' && (
          <UrunlerSekmesi
            urunler={urunler}
            setUrunler={setUrunler}
            hareketler={hareketler}
            setHareketler={setHareketler}
            dusukStokEsigi={ayarlar.dusukStokEsigi}
            formatPara={formatPara}
            yeniId={yeniId}
          />
        )}
        {aktifSekme === 'satis' && (
          <SatisSekmesi
            urunler={urunler}
            setUrunler={setUrunler}
            musteriler={musteriler}
            hareketler={hareketler}
            setHareketler={setHareketler}
            veresiyeKayitlari={veresiyeKayitlari}
            setVeresiyeKayitlari={setVeresiyeKayitlari}
            formatPara={formatPara}
            yeniId={yeniId}
          />
        )}
        {aktifSekme === 'musteriler' && (
          <MusterilerSekmesi
            musteriler={musteriler}
            setMusteriler={setMusteriler}
            musteriBakiyeleri={musteriBakiyeleri}
            veresiyeKayitlari={veresiyeKayitlari}
            setVeresiyeKayitlari={setVeresiyeKayitlari}
            formatPara={formatPara}
            yeniId={yeniId}
          />
        )}
        {aktifSekme === 'veresiye' && (
          <VeresiyeSekmesi
            musteriler={musteriler}
            veresiyeKayitlari={veresiyeKayitlari}
            setVeresiyeKayitlari={setVeresiyeKayitlari}
            musteriBakiyeleri={musteriBakiyeleri}
            formatPara={formatPara}
            formatTarih={formatTarih}
            yeniId={yeniId}
          />
        )}
        {aktifSekme === 'faturalar' && (
          <FaturalarSekmesi
            faturalar={faturalar}
            setFaturalar={setFaturalar}
            tedarikciler={tedarikciler}
            setTedarikciler={setTedarikciler}
            urunler={urunler}
            setUrunler={setUrunler}
            formatPara={formatPara}
            formatTarih={formatTarih}
            yeniId={yeniId}
          />
        )}
        {aktifSekme === 'raporlar' && (
          <RaporlarSekmesi
            hareketler={hareketler}
            urunler={urunler}
            faturalar={faturalar}
            tedarikciler={tedarikciler}
            formatPara={formatPara}
            formatTarih={formatTarih}
          />
        )}
        {aktifSekme === 'ayarlar' && (
          <AyarlarSekmesi ayarlar={ayarlar} setAyarlar={setAyarlar} urunler={urunler} setUrunler={setUrunler} />
        )}
      </main>
    </div>
  );
}

// ============ PANEL ============
function Panel({ urunler, musteriler, dusukStoklar, toplamStokDegeri, toplamAlacak, bugunSatis, hareketler, musteriBakiyeleri, formatPara, formatTarih }) {
  const sonHareketler = [...hareketler].sort((a, b) => new Date(b.tarih) - new Date(a.tarih)).slice(0, 5);
  const enYuksekBorclular = musteriler
    .map(m => ({ ...m, bakiye: musteriBakiyeleri[m.id] || 0 }))
    .filter(m => m.bakiye > 0)
    .sort((a, b) => b.bakiye - a.bakiye)
    .slice(0, 5);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KartIstatistik renk="amber" baslik="Bugünkü Satış" deger={formatPara(bugunSatis)} icon={TrendingUp} />
        <KartIstatistik renk="emerald" baslik="Stok Değeri" deger={formatPara(toplamStokDegeri)} altYazi={`${urunler.length} ürün`} icon={Package} />
        <KartIstatistik renk="rose" baslik="Toplam Alacak" deger={formatPara(toplamAlacak)} altYazi={`${musteriler.length} müşteri`} icon={Wallet} />
        <KartIstatistik renk="orange" baslik="Düşük Stok" deger={dusukStoklar.length.toString()} altYazi="ürün uyarıda" icon={AlertTriangle} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Son Hareketler</h3>
          {sonHareketler.length === 0 ? (
            <p className="text-slate-500 text-sm py-8 text-center">Henüz hareket yok</p>
          ) : (
            <div className="space-y-2">
              {sonHareketler.map(h => (
                <div key={h.id} className="flex items-center gap-3 p-3 bg-slate-100 rounded-lg">
                  {h.tip === 'cikis' ? (
                    <ArrowUpCircle className="w-5 h-5 text-rose-600 flex-shrink-0" />
                  ) : (
                    <ArrowDownCircle className="w-5 h-5 text-emerald-600 flex-shrink-0" />
                  )}
                  <div className="flex-1 min-w-0">
                    <p className="font-medium truncate">{h.urunAdi}</p>
                    <p className="text-xs text-slate-500">{formatTarih(h.tarih)}</p>
                  </div>
                  <div className="text-right">
                    <p className="font-mono font-semibold">{h.tip === 'cikis' ? '-' : '+'}{h.adet}</p>
                    {h.satisFiyati > 0 && <p className="text-xs text-slate-500">{formatPara(h.adet * h.satisFiyati)}</p>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">En Yüksek Borçlular</h3>
          {enYuksekBorclular.length === 0 ? (
            <p className="text-slate-500 text-sm py-8 text-center">Borçlu müşteri yok</p>
          ) : (
            <div className="space-y-2">
              {enYuksekBorclular.map(m => (
                <div key={m.id} className="flex items-center justify-between p-3 bg-slate-100 rounded-lg">
                  <div className="min-w-0 flex-1">
                    <p className="font-medium truncate">{m.ad}</p>
                    {m.telefon && <p className="text-xs text-slate-500">{m.telefon}</p>}
                  </div>
                  <p className="font-mono font-semibold text-rose-600">{formatPara(m.bakiye)}</p>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {dusukStoklar.length > 0 && (
        <div className="bg-red-950/20 border border-red-900/50 rounded-xl p-5">
          <h3 className="text-sm font-semibold text-red-700 uppercase tracking-wider mb-4 flex items-center gap-2">
            <AlertTriangle className="w-4 h-4" /> Düşük Stoktaki Ürünler
          </h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
            {dusukStoklar.map(u => (
              <div key={u.id} className="flex justify-between items-center p-3 bg-slate-100 rounded-lg">
                <div className="min-w-0">
                  <p className="font-medium truncate">{u.ad}</p>
                  <p className="text-xs text-slate-500 font-mono">{u.kod}</p>
                </div>
                <span className="font-mono font-bold text-red-600">{u.stok}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function UrunlerSekmesi({ urunler, setUrunler, hareketler, setHareketler, dusukStokEsigi, formatPara, yeniId }) {
  const [arama, setArama] = useState('');
  const [modal, setModal] = useState(null); // null | 'yeni' | {tip:'duzenle', urun} | {tip:'giris', urun} | 'kategoriYonet'
  const [tarayiciAcik, setTarayiciAcik] = useState(false);
  const [buyukFoto, setBuyukFoto] = useState(null);
  const [secilenKategori, setSecilenKategori] = useState('tumu'); // 'tumu' | kategori adı

  // Mevcut tüm kategorileri ürünlerden topla
  const kategoriler = useMemo(() => {
    const set = new Set();
    urunler.forEach(u => {
      if (u.kategori && u.kategori.trim()) set.add(u.kategori.trim());
    });
    return Array.from(set).sort((a, b) => a.localeCompare(b, 'tr'));
  }, [urunler]);

  // Her kategoride kaç ürün var
  const kategoriSayilar = useMemo(() => {
    const sayilar = { tumu: urunler.length, kategorisiz: 0 };
    urunler.forEach(u => {
      const k = u.kategori?.trim() || '';
      if (!k) sayilar.kategorisiz++;
      else sayilar[k] = (sayilar[k] || 0) + 1;
    });
    return sayilar;
  }, [urunler]);

  const filtrelenmis = useMemo(() => {
    let liste = urunler;
    
    // Kategori filtresi
    if (secilenKategori === 'kategorisiz') {
      liste = liste.filter(u => !u.kategori || !u.kategori.trim());
    } else if (secilenKategori !== 'tumu') {
      liste = liste.filter(u => u.kategori?.trim() === secilenKategori);
    }
    
    // Arama filtresi
    const a = arama.toLowerCase().trim();
    if (a) {
      liste = liste.filter(u => 
        u.ad.toLowerCase().includes(a) || 
        u.kod.toLowerCase().includes(a) ||
        (u.barkod && u.barkod.toLowerCase().includes(a))
      );
    }
    
    // En yeni eklenenler üstte (eklenme tarihi olmayanlar en altta)
    return [...liste].sort((a, b) => {
      if (!a.eklenmeTarihi && !b.eklenmeTarihi) return 0;
      if (!a.eklenmeTarihi) return 1;
      if (!b.eklenmeTarihi) return -1;
      return new Date(b.eklenmeTarihi) - new Date(a.eklenmeTarihi);
    });
  }, [urunler, arama, secilenKategori]);

  const urunSil = (id) => {
    if (confirm('Bu ürünü silmek istediğinizden emin misiniz?')) {
      setUrunler(urunler.filter(u => u.id !== id));
    }
  };

  return (
    <div>
      <div className="flex flex-col sm:flex-row gap-3 mb-3">
        <div className="relative flex-1">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" />
          <input
            type="text"
            placeholder="Ürün adı, parça kodu veya barkod ara..."
            value={arama}
            onChange={e => setArama(e.target.value)}
            className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-amber-500/50 text-sm"
          />
        </div>
        <button
          onClick={() => setTarayiciAcik(true)}
          className="flex items-center justify-center gap-2 px-4 py-2.5 bg-amber-500/20 border-2 border-amber-500 text-amber-600 rounded-lg font-semibold text-sm hover:bg-amber-500/30"
          title="Kamera ile barkod oku"
        >
          <ScanLine className="w-5 h-5" /> Barkod Oku
        </button>
        <button onClick={() => setModal('yeni')} className="flex items-center justify-center gap-2 px-4 py-2.5 bg-amber-500 text-slate-900 rounded-lg font-semibold text-sm hover:bg-amber-400">
          <Plus className="w-4 h-4" /> Yeni Ürün
        </button>
      </div>

      {/* KATEGORİ FİLTRESİ */}

          <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">Kategoriler</span>

            <span className="text-xs text-slate-400 bg-slate-100 px-2 py-0.5 rounded font-mono">{kategoriler.length} kategori</span>

function UrunFormModal({ baslik, baslangicVerileri, onKapat, onKaydet, mevcutKategoriler = [] }) {
  const [kod, setKod] = useState(baslangicVerileri?.kod || '');
  const [ad, setAd] = useState(baslangicVerileri?.ad || '');
  const [kategori, setKategori] = useState(baslangicVerileri?.kategori || '');
  const [barkod, setBarkod] = useState(baslangicVerileri?.barkod || '');
  const [stok, setStok] = useState(baslangicVerileri?.stok?.toString() || '0');
  const [alisFiyati, setAlisFiyati] = useState(baslangicVerileri?.alisFiyati?.toString() || '');
  const [satisFiyati, setSatisFiyati] = useState(baslangicVerileri?.satisFiyati?.toString() || '');
  // Eski tek foto formatından yeni dizi formatına geçiş
  const [fotolar, setFotolar] = useState(() => {
    if (baslangicVerileri?.fotolar && Array.isArray(baslangicVerileri.fotolar)) {
      return baslangicVerileri.fotolar.slice(0, 3);
    }
    if (baslangicVerileri?.foto) {
      return [baslangicVerileri.foto];
    }
    return [];
  });
  const [tarayiciAcik, setTarayiciAcik] = useState(false);
  const [fotoYukleniyor, setFotoYukleniyor] = useState(false);
  const MAX_FOTO = 3;

  // Fotoğraf seçildiğinde küçült ve Cloudinary'e yükle, URL al
  const fotoSec = (event) => {
    if (fotolar.length >= MAX_FOTO) {
      return alert(`En fazla ${MAX_FOTO} fotoğraf ekleyebilirsiniz`);
    }
    const dosya = event.target.files?.[0];
    if (!dosya) return;
    
    if (!dosya.type.startsWith('image/')) {
      return alert('Lütfen bir resim dosyası seçin');
    }
    
    setFotoYukleniyor(true);
    const okuyucu = new FileReader();
    okuyucu.onload = (e) => {
      const img = new Image();
      img.onload = async () => {
        // Resmi 800x800 max'a sığdır (orta kalite, daha az yer)
        const maxBoyut = 800;
        let genislik = img.width;
        let yukseklik = img.height;
        
        if (genislik > yukseklik) {
          if (genislik > maxBoyut) {
            yukseklik = (yukseklik * maxBoyut) / genislik;
            genislik = maxBoyut;
          }
        } else {
          if (yukseklik > maxBoyut) {
            genislik = (genislik * maxBoyut) / yukseklik;
            yukseklik = maxBoyut;
          }
        }
        
        const kanvas = document.createElement('canvas');
        kanvas.width = genislik;
        kanvas.height = yukseklik;
        const ctx = kanvas.getContext('2d');
        ctx.drawImage(img, 0, 0, genislik, yukseklik);
        
        // 0.65 kalite ile JPEG'e çevir - orta kalite, daha çok fotoğraf sığar
        const base64 = kanvas.toDataURL('image/jpeg', 0.65);
        
        try {
          // Cloudinary'e yükle, URL al
          const url = await window.cloudinaryYukle(base64);
          setFotolar(prev => [...prev, url].slice(0, MAX_FOTO));
          setFotoYukleniyor(false);
        } catch (hata) {
          console.error("Cloudinary hatasi:", hata);
          alert("Fotoğraf yüklenemedi. İnternet bağlantınızı kontrol edip tekrar deneyin.");
          setFotoYukleniyor(false);
        }
        event.target.value = '';
      };
      img.onerror = () => {
        setFotoYukleniyor(false);
        alert('Resim yüklenemedi');
        event.target.value = '';
      };
      img.src = e.target.result;
    };
    okuyucu.onerror = () => {
      setFotoYukleniyor(false);
      alert('Dosya okunamadı');
    };
    okuyucu.readAsDataURL(dosya);
  };

  const fotoSil = (index) => {
    if (confirm('Bu fotoğrafı silmek istediğinizden emin misiniz?')) {
      setFotolar(prev => prev.filter((_, i) => i !== index));
    }
  };

  const kaydet = () => {
    if (!ad.trim() || !kod.trim()) return alert('Parça kodu ve ürün adı gerekli');
    onKaydet({
      kod: kod.trim(),
      ad: ad.trim(),
      kategori: kategori.trim(),
      barkod: barkod.trim(),
      stok: parseInt(stok) || 0,
      alisFiyati: parseFloat(alisFiyati) || 0,
      satisFiyati: parseFloat(satisFiyati) || 0,
      fotolar: fotolar,
      foto: fotolar[0] || '', // Geriye dönük uyumluluk için
    });
  };

  return (
    <Modal baslik={baslik} onKapat={onKapat}>
      <div className="space-y-3">
        {/* DÜZENLEME MODUNDA EKLENMİŞ TARİH BİLGİSİ */}
        {baslangicVerileri?.eklenmeTarihi && (
          <div className="bg-slate-50 border border-slate-200 rounded-lg p-2.5 flex items-center justify-between text-xs">
            <span className="text-slate-500">📅 Eklenme Tarihi:</span>
            <span className="font-mono font-semibold text-slate-700">
              {new Date(baslangicVerileri.eklenmeTarihi).toLocaleString('tr-TR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
              })}
            </span>
          </div>
        )}

        {/* FOTOĞRAF ALANI - ÇOKLU */}
        <FormAlani label={`Ürün Fotoğrafları (${fotolar.length}/${MAX_FOTO})`}>
          {/* Eklenmiş fotoğraflar */}
          {fotolar.length > 0 && (
            <>

                <FileText className="w-5 h-5 text-slate-500" />
                <span className="text-xs font-semibold text-slate-700">Galeriden Seç</span>

function StokGirisModal({ urun, onKapat, onKaydet, formatPara }) {
  const [adet, setAdet] = useState('');
  const [fiyat, setFiyat] = useState(urun.alisFiyati.toString());
  const [not, setNot] = useState('');

  const kaydet = () => {
    const a = parseInt(adet);
    if (!a || a <= 0) return alert('Geçerli bir adet girin');
    onKaydet(a, parseFloat(fiyat) || 0, not);
  };

  return (
    <Modal baslik="Stok Girişi" onKapat={onKapat}>
      <div className="bg-slate-100 p-3 rounded-lg mb-3">
        <p className="font-semibold">{urun.ad}</p>
        <p className="text-xs text-slate-500 font-mono">{urun.kod} • Mevcut stok: {urun.stok}</p>
      </div>
      <div className="space-y-3">
        <FormAlani label="Giriş Adedi *">
          <input type="number" value={adet} onChange={e => setAdet(e.target.value)} className="form-input" autoFocus />
        </FormAlani>
        <FormAlani label="Birim Alış Fiyatı (₺)">
          <input type="number" step="0.01" value={fiyat} onChange={e => setFiyat(e.target.value)} className="form-input" />
        </FormAlani>
        <FormAlani label="Not (opsiyonel)">
          <input type="text" value={not} onChange={e => setNot(e.target.value)} placeholder="Tedarikçi, fatura no vb." className="form-input" />
        </FormAlani>
        <ModalButonlar onIptal={onKapat} onKaydet={kaydet} kaydetMetin="Girişi Kaydet" />
      </div>
    </Modal>
  );
}

// ============ SATIŞ ============
function SatisSekmesi({ urunler, setUrunler, musteriler, hareketler, setHareketler, veresiyeKayitlari, setVeresiyeKayitlari, formatPara, yeniId }) {
  const [sepet, setSepet] = useState([]); // [{urunId, ad, kod, adet, fiyat, mevcutStok}]
  const [arama, setArama] = useState('');
  const [musteriId, setMusteriId] = useState('');
  const [odemeTipi, setOdemeTipi] = useState('nakit'); // nakit | veresiye
  const [tarayiciAcik, setTarayiciAcik] = useState(false);
  
  const sonuclar = useMemo(() => {
    const a = arama.toLowerCase().trim();
    if (!a) return [];
    return urunler.filter(u => 
      u.ad.toLowerCase().includes(a) || 
      u.kod.toLowerCase().includes(a) ||
      (u.barkod && u.barkod.toLowerCase().includes(a))
    ).slice(0, 8);
  }, [urunler, arama]);

  const sepeteEkle = (urun) => {
    const mevcut = sepet.find(s => s.urunId === urun.id);
    if (mevcut) {
      if (mevcut.adet >= urun.stok) return alert('Stokta yeterli ürün yok');
      setSepet(sepet.map(s => s.urunId === urun.id ? {...s, adet: s.adet + 1} : s));
    } else {
      if (urun.stok <= 0) return alert('Bu ürün stokta yok');
      setSepet([...sepet, { urunId: urun.id, ad: urun.ad, kod: urun.kod, adet: 1, fiyat: urun.satisFiyati, mevcutStok: urun.stok }]);
    }
    setArama('');
  };

  const barkodOkundu = (deger) => {
    setTarayiciAcik(false);
    const urun = urunler.find(u => u.barkod === deger);
    if (urun) {
      sepeteEkle(urun);
    } else {
      alert(`"${deger}" barkodlu ürün bulunamadı. Önce ürünü stoklara ekleyin.`);
    }
  };

  const sepetGuncelle = (urunId, adet) => {
    const a = parseInt(adet) || 0;
    const item = sepet.find(s => s.urunId === urunId);
    if (a > item.mevcutStok) return alert('Stokta yeterli ürün yok');
    if (a <= 0) return setSepet(sepet.filter(s => s.urunId !== urunId));
    setSepet(sepet.map(s => s.urunId === urunId ? {...s, adet: a} : s));
  };

  const fiyatGuncelle = (urunId, fiyat) => {
    setSepet(sepet.map(s => s.urunId === urunId ? {...s, fiyat: parseFloat(fiyat) || 0} : s));
  };

  const sepettenSil = (urunId) => setSepet(sepet.filter(s => s.urunId !== urunId));

  const toplam = sepet.reduce((t, s) => t + s.adet * s.fiyat, 0);

  const satisiTamamla = () => {
    if (sepet.length === 0) return alert('Sepet boş');
    if (odemeTipi === 'veresiye' && !musteriId) return alert('Veresiye satış için müşteri seçin');
    
    const tarih = new Date().toISOString();
    const musteri = musteriler.find(m => m.id === musteriId);

    // Stoktan düş
    setUrunler(urunler.map(u => {
      const s = sepet.find(x => x.urunId === u.id);
      return s ? {...u, stok: u.stok - s.adet} : u;
    }));

    // Hareketler ekle
    const yeniHareketler = sepet.map(s => ({
      id: yeniId(),
      tip: 'cikis',
      urunId: s.urunId,
      urunAdi: s.ad,
      adet: s.adet,
      satisFiyati: s.fiyat,
      alisFiyati: 0,
      odemeTipi,
      musteriId: musteriId || null,
      musteriAdi: musteri?.ad || null,
      tarih
    }));
    setHareketler([...hareketler, ...yeniHareketler]);

    // Veresiye ise borç ekle
    if (odemeTipi === 'veresiye' && musteriId) {
      setVeresiyeKayitlari([...veresiyeKayitlari, {
        id: yeniId(),
        musteriId,
        tip: 'borc',
        tutar: toplam,
        aciklama: `Satış: ${sepet.map(s => `${s.ad} (${s.adet})`).join(', ')}`,
        tarih
      }]);
    }

    setSepet([]);
    setMusteriId('');
    setOdemeTipi('nakit');
    alert(`Satış tamamlandı: ${formatPara(toplam)}`);
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
      <div className="lg:col-span-3 space-y-4">
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Ürün Ara ve Ekle</h3>
          <div className="flex gap-2 mb-2">
            <button
              onClick={() => setTarayiciAcik(true)}
              className="flex items-center justify-center gap-2 px-4 py-2.5 bg-amber-500/20 border-2 border-amber-500 text-amber-600 rounded-lg font-semibold text-sm hover:bg-amber-500/30 w-full"
              title="Barkod oku"
            >
              <ScanLine className="w-5 h-5" /> Kamera ile Barkod Oku
            </button>
          </div>
          <div className="relative">
            <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" />
            <input
              type="text"
              placeholder="Veya parça kodu, ürün adı, barkod yazın..."
              value={arama}
              onChange={e => setArama(e.target.value)}
              className="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-amber-500/50 text-sm"
            />
            {sonuclar.length > 0 && (
              <div className="absolute top-full left-0 right-0 mt-1 bg-slate-50 border border-slate-200 rounded-lg shadow-xl z-10 max-h-72 overflow-y-auto">
                {sonuclar.map(u => (
                  <button
                    key={u.id}
                    onClick={() => sepeteEkle(u)}
                    className="w-full text-left px-3 py-2.5 hover:bg-slate-100 border-b border-slate-200 last:border-0 flex justify-between items-center"
                  >
                    <div>
                      <p className="font-medium text-sm">{u.ad}</p>
                      <p className="text-xs text-slate-500 font-mono">{u.kod} • Stok: {u.stok}</p>
                    </div>
                    <p className="text-sm font-mono">{formatPara(u.satisFiyati)}</p>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-3">Sepet ({sepet.length})</h3>
          {sepet.length === 0 ? (
            <p className="text-slate-500 text-sm py-8 text-center">Sepet boş. Yukarıdan ürün arayıp ekleyin.</p>
          ) : (
            <div className="space-y-2">
              {sepet.map(s => (
                <div key={s.urunId} className="flex flex-col sm:flex-row gap-2 items-start sm:items-center p-3 bg-slate-100 rounded-lg">
                  <div className="flex-1 min-w-0">
                    <p className="font-medium text-sm truncate">{s.ad}</p>
                    <p className="text-xs text-slate-500 font-mono">{s.kod}</p>
                  </div>
                  <div className="flex items-center gap-2 w-full sm:w-auto">
                    <input
                      type="number"
                      value={s.adet}
                      onChange={e => sepetGuncelle(s.urunId, e.target.value)}
                      className="w-16 px-2 py-1 bg-white border border-slate-300 rounded text-center text-sm font-mono"
                    />
                    <span className="text-slate-500 text-xs">×</span>
                    <input
                      type="number"
                      step="0.01"
                      value={s.fiyat}
                      onChange={e => fiyatGuncelle(s.urunId, e.target.value)}
                      className="w-24 px-2 py-1 bg-white border border-slate-300 rounded text-right text-sm font-mono"
                    />
                    <span className="w-24 text-right font-mono font-semibold text-sm">{formatPara(s.adet * s.fiyat)}</span>
                    <button onClick={() => sepettenSil(s.urunId)} className="p-1 text-red-600 hover:bg-red-500/10 rounded">
                      <X className="w-4 h-4" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="lg:col-span-2">
        <div className="bg-white border border-slate-200 rounded-xl p-4 sticky top-32">
          <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-4">Ödeme</h3>
          
          <div className="grid grid-cols-2 gap-2 mb-4">
            <button
              onClick={() => setOdemeTipi('nakit')}
              className={`py-2.5 rounded-lg text-sm font-semibold border ${odemeTipi === 'nakit' ? 'bg-amber-500 text-slate-900 border-amber-500' : 'bg-slate-50 border-slate-200 text-slate-700'}`}
            >
              Nakit / Kart
            </button>
            <button
              onClick={() => setOdemeTipi('veresiye')}
              className={`py-2.5 rounded-lg text-sm font-semibold border ${odemeTipi === 'veresiye' ? 'bg-amber-500 text-slate-900 border-amber-500' : 'bg-slate-50 border-slate-200 text-slate-700'}`}
            >
              Veresiye
            </button>
          </div>

          {odemeTipi === 'veresiye' && (
            <FormAlani label="Müşteri *">
              <select value={musteriId} onChange={e => setMusteriId(e.target.value)} className="form-input">
                <option value="">Müşteri seçin...</option>
                {musteriler.map(m => <option key={m.id} value={m.id}>{m.ad}</option>)}
              </select>
            </FormAlani>
          )}

          <div className="border-t border-slate-200 my-4 pt-4">
            <div className="flex justify-between items-baseline mb-4">
              <span className="text-slate-500 text-sm">Toplam</span>
              <span className="text-3xl font-bold tracking-tight">{formatPara(toplam)}</span>
            </div>
            <button
              onClick={satisiTamamla}
              disabled={sepet.length === 0}
              className="w-full py-3 bg-amber-500 text-slate-900 rounded-lg font-bold hover:bg-amber-400 disabled:opacity-30 disabled:cursor-not-allowed"
            >
              Satışı Tamamla
            </button>
          </div>
        </div>
      </div>
      {tarayiciAcik && (
        <BarkodTarayici onKapat={() => setTarayiciAcik(false)} onOkundu={barkodOkundu} />
      )}
    </div>
  );
}

// ============ MÜŞTERİLER ============
function MusterilerSekmesi({ musteriler, setMusteriler, musteriBakiyeleri, veresiyeKayitlari, setVeresiyeKayitlari, formatPara, yeniId }) {
  const [arama, setArama] = useState('');
  const [modal, setModal] = useState(null);
  const [hizliVeresiye, setHizliVeresiye] = useState(null); // {tip: 'borc'|'odeme', musteri}
  const [acikMusteriId, setAcikMusteriId] = useState(null); // detay görünümü için seçili müşteri
  const [secimModu, setSecimModu] = useState(false);
  const [secilenKayitlar, setSecilenKayitlar] = useState(new Set());

  // Müşteri değişince seçimleri sıfırla
  useEffect(() => {
    setSecilenKayitlar(new Set());
    setSecimModu(false);
  }, [acikMusteriId]);

  const filtrelenmis = useMemo(() => {
    const a = arama.toLowerCase().trim();
    if (!a) return musteriler;
    return musteriler.filter(m => m.ad.toLowerCase().includes(a) || (m.telefon && m.telefon.includes(a)));
  }, [musteriler, arama]);

  const musteriSil = (id) => {
    if (confirm('Bu müşteriyi silmek istediğinizden emin misiniz? Veresiye kayıtları kalacak.')) {
      setMusteriler(musteriler.filter(m => m.id !== id));
      if (acikMusteriId === id) setAcikMusteriId(null);
    }
  };

  const formatTarih = (iso) => new Date(iso).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

  // Eğer bir müşteri açıksa, detay görünümünü göster
  const acikMusteri = acikMusteriId ? musteriler.find(m => m.id === acikMusteriId) : null;
  
  if (acikMusteriId && acikMusteri) {
    const bakiye = musteriBakiyeleri[acikMusteriId] || 0;
    const hareketler = [...veresiyeKayitlari]
      .filter(k => k.musteriId === acikMusteriId)
      .sort((a, b) => new Date(b.tarih) - new Date(a.tarih));

    const kayitSil = (id) => {
      if (confirm('Bu hesap hareketini silmek istediğinizden emin misiniz?')) {
        setVeresiyeKayitlari(veresiyeKayitlari.filter(k => k.id !== id));
      }
    };

    // TOPLU SİLME mantığı
    const kayitSecimToggle = (id) => {
      const yeni = new Set(secilenKayitlar);
      if (yeni.has(id)) yeni.delete(id);
      else yeni.add(id);
      setSecilenKayitlar(yeni);
    };

    const tumunuSec = () => {
      if (secilenKayitlar.size === hareketler.length) {
        setSecilenKayitlar(new Set());
      } else {
        setSecilenKayitlar(new Set(hareketler.map(k => k.id)));
      }
    };

    const secilenleriSil = () => {
      if (secilenKayitlar.size === 0) return;
      if (confirm(`${secilenKayitlar.size} kaydı silmek istediğinizden emin misiniz?`)) {
        setVeresiyeKayitlari(veresiyeKayitlari.filter(k => !secilenKayitlar.has(k.id)));
        setSecilenKayitlar(new Set());
        setSecimModu(false);
      }
    };

    const secimModunuKapat = () => {
      setSecimModu(false);
      setSecilenKayitlar(new Set());
    };

    return (
      <div className="space-y-4">
        {/* Geri butonu */}
        <button
          onClick={() => setAcikMusteriId(null)}
          className="flex items-center gap-2 text-slate-500 hover:text-amber-600 text-sm font-medium"
        >
          ← Müşteri listesine dön
        </button>

        {/* Müşteri başlık kartı */}
        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <div className="flex flex-col sm:flex-row justify-between gap-4 mb-4">
            <div className="flex items-start gap-3 min-w-0 flex-1">
              <div className="w-12 h-12 bg-amber-500/10 border border-amber-500/30 rounded-lg flex items-center justify-center flex-shrink-0">
                <Users className="w-6 h-6 text-amber-600" />
              </div>
              <div className="min-w-0 flex-1">
                <h2 className="text-2xl font-bold tracking-tight truncate">{acikMusteri.ad}</h2>

            </div>

              <button onClick={() => setModal({tip: 'duzenle', musteri: acikMusteri})} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500" title="Düzenle">

              </button>
              <button onClick={() => musteriSil(acikMusteri.id)} className="p-2 hover:bg-red-500/10 rounded-lg text-red-600" title="Sil">

          {/* Bakiye */}
          <div className="bg-slate-100 border border-slate-200 rounded-lg p-4 mb-4">

            <p className={`text-3xl font-bold font-mono ${bakiye > 0 ? 'text-rose-600' : bakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>

            </p>
            <p className="text-xs text-slate-500 mt-1">
              {bakiye > 0 ? `Müşteri size ${formatPara(bakiye)} borçlu` : bakiye < 0 ? `Siz müşteriye ${formatPara(Math.abs(bakiye))} borçlusunuz` : 'Hesap kapalı'}

          {/* Hızlı işlem butonları */}
          <div className="grid grid-cols-2 gap-2">
            <button
              onClick={() => setHizliVeresiye({tip: 'borc', musteri: acikMusteri})}

            >
              <Plus className="w-5 h-5" /> Borç Ekle
            </button>
            <button
              onClick={() => setHizliVeresiye({tip: 'odeme', musteri: acikMusteri})}
              className="py-3 px-4 bg-emerald-500 hover:bg-emerald-400 text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2"
            >
              <Check className="w-5 h-5" /> Ödeme Al

          </div>
        </div>

        {/* Hesap hareketleri listesi */}
        <div className="bg-white border border-slate-200 rounded-xl p-5">
          <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
            <h3 className="text-sm font-semibold text-slate-500 uppercase tracking-wider">Hesap Hareketleri</h3>
            <div className="flex items-center gap-2">
              <span className="text-xs text-slate-500 font-mono bg-slate-100 px-2 py-0.5 rounded">{hareketler.length} kayıt</span>
              {hareketler.length > 0 && !secimModu && (
                <button
                  onClick={() => setSecimModu(true)}
                  className="px-2.5 py-1 bg-amber-500/10 border border-amber-500/30 text-amber-700 rounded-md text-xs font-semibold hover:bg-amber-500/20"
                >
                  ☑ Seç
                </button>
              )}
              {secimModu && (
                <button
                  onClick={secimModunuKapat}

          {/* Toplu işlem barı - sadece seçim modunda */}
          {secimModu && hareketler.length > 0 && (
            <div className="mb-3 space-y-2">

                onClick={secilenleriSil}

                  color: secilenKayitlar.size === 0 ? '#475569' : '#ffffff',

                    <input
                      type="checkbox"
                      checked={secili}
                      onChange={() => kayitSecimToggle(k.id)}
                      onClick={e => e.stopPropagation()}
                      className="w-5 h-5 cursor-pointer accent-amber-500 flex-shrink-0 mt-1"
                    />
                  )}
                  <div className={`w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5 ${k.tip === 'borc' ? 'bg-rose-500/10 text-rose-600' : 'bg-emerald-500/10 text-emerald-600'}`}>
                    {k.tip === 'borc' ? <Plus className="w-4 h-4" /> : <Check className="w-4 h-4" />}

                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-2 flex-wrap">
                      <span className={`text-xs font-bold uppercase tracking-wider ${k.tip === 'borc' ? 'text-rose-600' : 'text-emerald-600'}`}>
                        {k.tip === 'borc' ? 'Borç' : 'Ödeme'}
                      </span>
                      {k.urunAdi && <span className="font-semibold text-sm">{k.urunAdi}</span>}
                    </div>
                    {k.aciklama && <p className="text-xs text-slate-500 mt-0.5 break-words">{k.aciklama}</p>}
                    <p className="text-xs text-slate-400 mt-1">{formatTarih(k.tarih)}</p>
                  </div>
                  <div className="flex flex-col items-end gap-1">
                    <p className={`font-mono font-bold whitespace-nowrap ${k.tip === 'borc' ? 'text-rose-600' : 'text-emerald-600'}`}>
                      {k.tip === 'borc' ? '+' : '-'}{formatPara(k.tutar)}
                    </p>
                    {!secimModu && (
                      <div className="flex gap-1">
                        <button
                          onClick={() => setModal({tip: 'hareketDuzenle', kayit: k})}
                          className="p-1.5 text-slate-500 hover:text-amber-600 hover:bg-amber-500/10 rounded"
                          title="Düzenle"
                        >
                          <Edit2 className="w-3.5 h-3.5" />
                        </button>
                        <button
                          onClick={() => kayitSil(k.id)}
                          className="p-1.5 text-slate-500 hover:text-red-600 hover:bg-red-500/10 rounded"
                          title="Sil"
                        >
                          <Trash2 className="w-3.5 h-3.5" />
                        </button>
                      </div>
                    )}
                  </div>
                </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Modaller (detay sayfasında da çalışsın) */}
        {modal?.tip === 'duzenle' && (
          <MusteriFormModal
            baslik="Müşteri Düzenle"
            baslangicVerileri={modal.musteri}
            onKapat={() => setModal(null)}
            onKaydet={(veri) => {
              setMusteriler(musteriler.map(m => m.id === modal.musteri.id ? {...m, ...veri} : m));
              setModal(null);
            }}
          />
        )}
        {hizliVeresiye && (
          <HizliVeresiyeModal
            tip={hizliVeresiye.tip}
            musteri={hizliVeresiye.musteri}
            mevcutBakiye={musteriBakiyeleri[hizliVeresiye.musteri.id] || 0}
            formatPara={formatPara}
            onKapat={() => setHizliVeresiye(null)}
            onKaydet={(urunAdi, tutar, aciklama, kalemler) => {
              setVeresiyeKayitlari([...veresiyeKayitlari, {
                id: yeniId(),
                musteriId: hizliVeresiye.musteri.id,
                tip: hizliVeresiye.tip,
                tutar,
                urunAdi: urunAdi || '',
                aciklama: aciklama || '',
                kalemler: kalemler || null,
                tarih: new Date().toISOString()
              }]);
              setHizliVeresiye(null);
            }}
          />
        )}
        {modal?.tip === 'hareketDuzenle' && (
          <HizliVeresiyeModal
            tip={modal.kayit.tip}
            musteri={acikMusteri}
            mevcutBakiye={musteriBakiyeleri[acikMusteri.id] || 0}
            formatPara={formatPara}
            duzenlenenKayit={modal.kayit}
            onKapat={() => setModal(null)}
            onKaydet={(urunAdi, tutar, aciklama, kalemler) => {
              setVeresiyeKayitlari(veresiyeKayitlari.map(k => 
                k.id === modal.kayit.id 
                  ? { ...k, tutar, urunAdi: urunAdi || '', aciklama: aciklama || '', kalemler: kalemler || null }
                  : k
              ));
              setModal(null);
            }}
          />
        )}
      </div>
    );
  }

  // Müşteri liste görünümü
  return (
    <div>
      <div className="flex flex-col sm:flex-row gap-3 mb-5">
        <div className="relative flex-1">
          <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" />
          <input
            type="text"
            placeholder="Müşteri adı veya telefon..."
            value={arama}
            onChange={e => setArama(e.target.value)}
            className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg focus:outline-none focus:border-amber-500/50 text-sm"
          />
        </div>
        <button onClick={() => setModal('yeni')} className="flex items-center justify-center gap-2 px-4 py-2.5 bg-amber-500 text-slate-900 rounded-lg font-semibold text-sm hover:bg-amber-400">
          <Plus className="w-4 h-4" /> Yeni Müşteri
        </button>
      </div>

      {filtrelenmis.length === 0 ? (
        <div className="bg-white border border-slate-200 rounded-xl p-12 text-center">
          <Users className="w-12 h-12 text-slate-300 mx-auto mb-3" />
          <p className="text-slate-500">{musteriler.length === 0 ? 'Henüz müşteri yok.' : 'Aramaya uygun müşteri bulunamadı.'}</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtrelenmis.map(m => {
            const bakiye = musteriBakiyeleri[m.id] || 0;
            return (
              <div
                key={m.id}
                onClick={() => setAcikMusteriId(m.id)}
                role="button"
                tabIndex={0}
                onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') setAcikMusteriId(m.id); }}
                className="bg-white border border-slate-200 hover:border-amber-500/50 active:border-amber-500 hover:bg-slate-50 rounded-xl p-4 text-left transition-all group cursor-pointer select-none"
              >
                <div className="flex justify-between items-start mb-3">
                  <div className="min-w-0 flex-1">
                    <p className="font-semibold truncate group-hover:text-amber-600 transition-colors">{m.ad}</p>
                    {m.telefon && <p className="text-xs text-slate-500 mt-0.5">{m.telefon}</p>}
                  </div>
                </div>
                {m.notlar && <p className="text-xs text-slate-500 mb-3 line-clamp-2">{m.notlar}</p>}
                <div className="border-t border-slate-200 pt-3">
                  <div className="flex justify-between items-end">
                    <div>
                      <p className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">Bakiye</p>
                      <p className={`text-lg font-bold font-mono ${bakiye > 0 ? 'text-rose-600' : bakiye < 0 ? 'text-emerald-600' : 'text-slate-500'}`}>
                        {formatPara(Math.abs(bakiye))}
                      </p>
                      <p className="text-xs text-slate-500">
                        {bakiye > 0 ? 'Borçlu' : bakiye < 0 ? 'Alacaklı' : 'Kapalı'}
                      </p>
                    </div>
                    <span className="text-xs text-amber-600 group-hover:text-amber-600 font-semibold">Detay →</span>
                  </div>
                </div>
