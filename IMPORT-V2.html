// ============ BARKOD TARAYICI ============
function BarkodTarayici({ onKapat, onOkundu }) {
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);
  const taramaAktifRef = React.useRef(true);
  const manuelInputRef = React.useRef(null);
  const [durum, setDurum] = useState('baslatiliyor'); // baslatiliyor, hazir, hata, desteklenmiyor, iframe
  const [hataMesaji, setHataMesaji] = useState('');
  const [manuelGiris, setManuelGiris] = useState('');

  // Iframe içinde mi kontrolü
  const iframeIcindeMi = () => {
    try {
      return window.self !== window.top;
    } catch {
      return true;
    }
  };

  useEffect(() => {
    let detector = null;
    
    async function baslat() {
      // Iframe içindeyse kamera çalışmaz - direkt manuel giriş aç
      if (iframeIcindeMi()) {
        setDurum('iframe');
        // Manuel girişe odaklan
        setTimeout(() => {
          if (manuelInputRef.current) manuelInputRef.current.focus();
        }, 100);
        return;
      }

      // BarcodeDetector desteğini kontrol et
      if (!('BarcodeDetector' in window)) {
        setDurum('desteklenmiyor');
        return;
      }

      try {
        // HTTPS kontrolü
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
          setDurum('hata');
          setHataMesaji('Kamera erişimi için sitenin HTTPS (güvenli) olması gerekiyor.');
          return;
        }

        // Kamera erişimi iste
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' } // arka kamera
        });
        streamRef.current = stream;
        
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
        }

        detector = new window.BarcodeDetector({
          formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code', 'upc_a', 'upc_e', 'codabar', 'itf']
        });
        
        setDurum('hazir');
        taramaAktifRef.current = true;
        tara(detector);
      } catch (e) {
        console.error(e);
        setDurum('hata');
        if (e.name === 'NotAllowedError' || e.name === 'PermissionDeniedError') {
          setHataMesaji('Kamera izni reddedildi veya bu ortamda kamera kullanımı engellenmiş. Manuel girişi kullanabilirsiniz.');
        } else if (e.name === 'NotFoundError' || e.name === 'DevicesNotFoundError') {
          setHataMesaji('Kamera bulunamadı.');
        } else if (e.name === 'NotReadableError' || e.name === 'TrackStartError') {
          setHataMesaji('Kamera başka bir uygulama tarafından kullanılıyor.');
        } else {
          setHataMesaji('Kamera açılamadı. Manuel girişi kullanabilirsiniz.');
        }
      }
    }

    async function tara(detector) {
      if (!taramaAktifRef.current || !videoRef.current || videoRef.current.readyState !== 4) {
        if (taramaAktifRef.current) requestAnimationFrame(() => tara(detector));
        return;
      }
      try {
        const barkodlar = await detector.detect(videoRef.current);
        if (barkodlar.length > 0 && taramaAktifRef.current) {
          taramaAktifRef.current = false;
          // Titreşim (mobil cihazlarda)
          if (navigator.vibrate) navigator.vibrate(100);
          onOkundu(barkodlar[0].rawValue);
          return;
        }
      } catch (e) {
        console.error('Tarama hatası:', e);
      }
      if (taramaAktifRef.current) requestAnimationFrame(() => tara(detector));
    }

    baslat();

    return () => {
      taramaAktifRef.current = false;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, [onOkundu]);

  const manuelKaydet = () => {
    const deger = manuelGiris.trim();
    if (!deger) return;
    onOkundu(deger);
  };

  return (
    <div className="fixed inset-0 bg-black z-[60] flex flex-col" onClick={e => e.stopPropagation()}>
      <div className="flex items-center justify-between p-4 bg-slate-50 border-b border-slate-200">
        <div className="flex items-center gap-2">
          <ScanLine className="w-5 h-5 text-amber-600" />
          <h2 className="text-lg font-bold text-slate-900">Barkod Tarayıcı</h2>
        </div>
        <button onClick={onKapat} className="p-2 hover:bg-slate-100 rounded-lg text-slate-700">
          <X className="w-5 h-5" />
        </button>
      </div>

      <div className="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
        {durum === 'desteklenmiyor' ? (
          <div className="p-6 text-center max-w-sm">
            <Camera className="w-12 h-12 text-slate-400 mx-auto mb-3" />
            <p className="text-slate-700 mb-2 font-semibold">Kamera taraması desteklenmiyor</p>
            <p className="text-slate-500 text-sm mb-4">
              Tarayıcınız barkod taramayı desteklemiyor. Chrome veya Edge kullanmayı deneyin.
              Şimdilik barkod numarasını manuel girebilirsiniz:
            </p>
          </div>
        ) : durum === 'iframe' ? (
          <div className="p-6 text-center max-w-md">
            <div className="w-16 h-16 bg-amber-500/10 border border-amber-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
              <Camera className="w-8 h-8 text-amber-600" />
            </div>
            <p className="text-slate-800 mb-3 font-semibold text-lg">Kamera Bu Ortamda Açılamaz</p>
            <p className="text-slate-500 text-sm mb-4 leading-relaxed">
              Bu uygulamayı önizleme penceresinde kullanıyorsunuz. Kamerayı kullanmak için uygulamayı kendi cihazınıza indirip açmanız gerekiyor.
            </p>
            <p className="text-slate-700 text-sm mb-3 font-semibold">Şimdilik barkodu manuel girebilirsiniz ↓</p>
          </div>
        ) : durum === 'hata' ? (
          <div className="p-6 text-center max-w-md">
            <div className="w-16 h-16 bg-rose-500/10 border border-rose-500/30 rounded-full flex items-center justify-center mx-auto mb-4">
              <AlertTriangle className="w-8 h-8 text-rose-600" />
            </div>
            <p className="text-slate-800 mb-3 font-semibold text-lg">Kamera Açılamadı</p>
            <p className="text-slate-500 text-sm mb-4 leading-relaxed">{hataMesaji}</p>
            <button
              onClick={() => window.location.reload()}
              className="px-4 py-2 bg-amber-500/10 border border-amber-500/30 text-amber-600 rounded-lg text-sm font-semibold hover:bg-amber-500/20 mb-2"
            >
              Sayfayı Yenile ve Tekrar Dene
            </button>
            <p className="text-slate-500 text-xs mt-3">veya aşağıdan barkod numarasını manuel girebilirsiniz</p>
          </div>
        ) : (
          <>
            <video
              ref={videoRef}
              className="w-full h-full object-cover"
              playsInline
              muted
            />
            {/* Tarama çerçevesi */}
            <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
              <div className="relative w-72 h-44 max-w-[80vw]">
                <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-amber-500 rounded-tl-lg"></div>
                <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-amber-500 rounded-tr-lg"></div>
                <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-amber-500 rounded-bl-lg"></div>
                <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-amber-500 rounded-br-lg"></div>
                <div className="absolute left-0 right-0 top-1/2 h-0.5 bg-amber-500 animate-pulse"></div>
              </div>
            </div>
            {durum === 'baslatiliyor' && (
              <div className="absolute inset-0 flex items-center justify-center bg-slate-900/30">
                <p className="text-slate-700">Kamera başlatılıyor...</p>
              </div>
            )}
            <div className="absolute bottom-24 left-0 right-0 text-center">
              <p className="text-slate-800 text-sm bg-slate-900/30 inline-block px-4 py-2 rounded-full backdrop-blur">
                Barkodu çerçevenin içine getirin
              </p>
            </div>
          </>
        )}
      </div>

      {/* Manuel giriş alanı */}
      <div className="p-4 bg-slate-50 border-t border-slate-200">
        <p className="text-xs text-slate-500 uppercase tracking-wider mb-2 font-semibold">Veya manuel girin</p>
        <div className="flex gap-2">
          <input
            type="text"
            value={manuelGiris}
            onChange={e => setManuelGiris(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && manuelKaydet()}
            placeholder="Barkod numarası..."
            className="flex-1 px-3 py-2.5 bg-white border border-slate-200 rounded-lg text-slate-900 text-sm focus:outline-none focus:border-amber-500/50"
          />
          <button
            onClick={manuelKaydet}
            disabled={!manuelGiris.trim()}
            className="px-4 py-2.5 bg-amber-500 text-slate-900 rounded-lg font-semibold text-sm hover:bg-amber-400 disabled:opacity-30"
          >
            Onayla
          </button>
        </div>
      </div>
    </div>
  );
}

// ============ GİRİŞ EKRANI ============
function GirisEkrani({ dukkanAdi, dogruParola, onGiris }) {
  const [parola, setParola] = useState('');
  const [hata, setHata] = useState(false);
  const [gosteriliyor, setGosteriliyor] = useState(false);

  const giris = () => {
    if (parola === dogruParola) {
      onGiris();
    } else {
      setHata(true);
      setParola('');
      setTimeout(() => setHata(false), 2000);
    }
  };

  return (
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        {/* Logo ve başlık */}
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-500/20">
            <Zap className="w-9 h-9 text-slate-900" strokeWidth={2.5} />
          </div>
          <h1 className="text-2xl font-bold text-slate-900 mb-1">{dukkanAdi}</h1>
          <p className="text-xs text-slate-500 font-mono uppercase tracking-wider">Stok & Veresiye Sistemi</p>
        </div>

        {/* Giriş kartı */}
        <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-xl">
          <div className="flex items-center gap-2 mb-5">
            <Lock className="w-5 h-5 text-amber-600" />
            <h2 className="text-lg font-bold text-slate-900">Giriş Yap</h2>
          </div>

          <div className="space-y-4">
            <div>
              <label className="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                Parola
              </label>
              <div className="relative">
                <input
                  type={gosteriliyor ? 'text' : 'password'}
                  value={parola}
                  onChange={e => { setParola(e.target.value); setHata(false); }}
                  onKeyDown={e => e.key === 'Enter' && giris()}
                  className={`w-full pl-3 pr-10 py-3 bg-slate-50 border rounded-lg text-slate-900 text-base focus:outline-none transition-colors ${
                    hata ? 'border-rose-500 animate-pulse' : 'border-slate-200 focus:border-amber-500/50'
                  }`}
                  placeholder="••••••••"
                  autoFocus
                />
                <button
                  type="button"
                  onClick={() => setGosteriliyor(!gosteriliyor)}
                  className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-slate-500 hover:text-slate-700"
                  title={gosteriliyor ? 'Gizle' : 'Göster'}
                >
                  {gosteriliyor ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
                </button>
              </div>
              {hata && (
                <p className="text-xs text-rose-600 mt-2 flex items-center gap-1">
                  <AlertTriangle className="w-3 h-3" /> Parola hatalı, tekrar deneyin
                </p>
              )}
            </div>

            <button
              onClick={giris}
              disabled={!parola}
              className="w-full py-3 bg-amber-500 text-slate-900 rounded-lg font-bold text-base hover:bg-amber-400 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
            >
              Giriş Yap
            </button>
          </div>
        </div>

        <p className="text-center text-xs text-slate-400 mt-6">
          Parolayı Ayarlar bölümünden değiştirebilirsiniz
        </p>
      </div>
    </div>
  );
}



// ============================================
// FATURALAR SEKMESİ - YENİ
// ============================================
function FaturalarSekmesi({ faturalar, setFaturalar, tedarikciler, setTedarikciler, urunler, setUrunler, formatPara, formatTarih, yeniId }) {
  const [arama, setArama] = useState('');
  const [donem, setDonem] = useState('tumu');
  const [modal, setModal] = useState(null);
  const [foto, setFoto] = useState(null);
  const [seciliFaturalar, setSeciliFaturalar] = useState([]);
  const [tedarikciModal, setTedarikciModal] = useState(false);

  // Tarih filtresi
  const filtreliFaturalar = useMemo(() => {
    let sonuc = [...faturalar];
    const simdi = new Date();
    
    if (donem === 'bugun') {
      sonuc = sonuc.filter(f => {
        const t = new Date(f.tarih);
        return t.toDateString() === simdi.toDateString();
      });
    } else if (donem === 'hafta') {
      const haftaOnce = new Date(simdi - 7*24*60*60*1000);
      sonuc = sonuc.filter(f => new Date(f.tarih) >= haftaOnce);
    } else if (donem === 'ay') {
      const ayOnce = new Date(simdi.getFullYear(), simdi.getMonth(), 1);
      sonuc = sonuc.filter(f => new Date(f.tarih) >= ayOnce);
    } else if (donem === 'gecenay') {
      const buAy = new Date(simdi.getFullYear(), simdi.getMonth(), 1);
      const gecenAy = new Date(simdi.getFullYear(), simdi.getMonth() - 1, 1);
      sonuc = sonuc.filter(f => {
        const t = new Date(f.tarih);
        return t >= gecenAy && t < buAy;
      });
    }
    
    if (arama.trim()) {
      const a = arama.toLowerCase();
      sonuc = sonuc.filter(f => 
        (f.tedarikciAdi || '').toLowerCase().includes(a) ||
        (f.faturaNo || '').toLowerCase().includes(a) ||
        (f.notlar || '').toLowerCase().includes(a)
      );
    }
    
    return sonuc.sort((a, b) => new Date(b.tarih) - new Date(a.tarih));
  }, [faturalar, donem, arama]);

  // Toplam hesaplamalar
  const toplam = filtreliFaturalar.reduce((s, f) => s + (f.toplam || 0), 0);
  const odenmis = filtreliFaturalar.filter(f => f.odendi).reduce((s, f) => s + (f.toplam || 0), 0);
  const odenmemis = filtreliFaturalar.filter(f => !f.odendi).reduce((s, f) => s + (f.toplam || 0), 0);

  const faturaSil = (id) => {
    if (!confirm('Bu faturayı silmek istediğinize emin misiniz?')) return;
    setFaturalar(faturalar.filter(f => f.id !== id));
  };

  const tumuneSil = () => {
    if (seciliFaturalar.length === 0) return;
    if (!confirm(`${seciliFaturalar.length} fatura silinecek. Emin misiniz?`)) return;
    setFaturalar(faturalar.filter(f => !seciliFaturalar.includes(f.id)));
    setSeciliFaturalar([]);
  };

  const odemeYap = (fatura) => {
    setFaturalar(faturalar.map(f => 
      f.id === fatura.id ? { ...f, odendi: !f.odendi, odemeTarihi: !f.odendi ? new Date().toISOString() : null } : f
    ));
  };

  return (
    <div className="space-y-4">
      {/* Üst Bar */}
      <div className="bg-white border border-slate-200 rounded-xl p-4">
        <div className="flex flex-col gap-3">
          {/* Arama ve butonlar */}
          <div className="flex flex-col md:flex-row gap-3">
            <div className="flex-1 relative">
              <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" />
              <input
                type="text"
                value={arama}
                onChange={e => setArama(e.target.value)}
                placeholder="Tedarikçi, fatura no veya not ara..."
                className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-amber-500"
              />
            </div>
            <button
              onClick={() => setTedarikciModal(true)}
              className="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg font-semibold text-sm flex items-center gap-2"
            >
              <Users className="w-4 h-4" />
              Tedarikçiler ({tedarikciler.length})
            </button>
            <button
              onClick={() => setModal({ tip: 'yeni' })}
              style={{backgroundColor: '#f59e0b', color: '#1f2937'}}
              className="px-4 py-2 rounded-lg font-semibold text-sm flex items-center gap-2 hover:opacity-90"
            >
              <Plus className="w-4 h-4" />
              Yeni Fatura
            </button>
          </div>

          {/* Dönem filtresi */}
          <div className="flex flex-wrap gap-2">
            {[
              { id: 'bugun', isim: 'Bugün' },
              { id: 'hafta', isim: 'Son 7 Gün' },
              { id: 'ay', isim: 'Bu Ay' },
              { id: 'gecenay', isim: 'Geçen Ay' },
              { id: 'tumu', isim: 'Tümü' },
            ].map(d => (
              <button
                key={d.id}
                onClick={() => setDonem(d.id)}
                className={`px-3 py-1.5 rounded-lg text-sm font-medium transition ${
                  donem === d.id 
                    ? 'bg-amber-500 text-slate-900' 
                    : 'bg-slate-100 text-slate-700 hover:bg-slate-200'
                }`}
              >
                {d.isim}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Özet Kartlar */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Fatura Sayısı</div>
          <div className="text-2xl font-bold text-slate-900">{filtreliFaturalar.length}</div>
        </div>
        <div className="bg-white border border-slate-200 rounded-xl p-4">
          <div className="text-xs text-slate-500 uppercase tracking-wider mb-1">Toplam</div>
          <div className="text-xl font-bold text-slate-900">{formatPara(toplam)}</div>
        </div>
        <div className="bg-white border-2 border-green-200 rounded-xl p-4">
          <div className="text-xs text-green-700 uppercase tracking-wider mb-1">Ödendi</div>
          <div className="text-xl font-bold text-green-700">{formatPara(odenmis)}</div>
        </div>
        <div className="bg-white border-2 border-red-200 rounded-xl p-4">
          <div className="text-xs text-red-700 uppercase tracking-wider mb-1">Ödenecek</div>
          <div className="text-xl font-bold text-red-700">{formatPara(odenmemis)}</div>
        </div>
      </div>

      {/* Toplu Silme */}
      {seciliFaturalar.length > 0 && (
        <div className="bg-red-50 border border-red-200 rounded-xl p-3 flex items-center justify-between">
          <div className="text-sm font-semibold text-red-700">{seciliFaturalar.length} fatura seçildi</div>
          <button
            onClick={tumuneSil}
            style={{backgroundColor: '#dc2626', color: 'white'}}
            className="px-3 py-1.5 rounded-lg font-semibold text-sm"
          >
            🗑️ Seçilenleri Sil
          </button>
        </div>
      )}

      {/* Fatura Listesi */}
      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden">
        {filtreliFaturalar.length === 0 ? (
          <div className="p-12 text-center">
            <Receipt className="w-12 h-12 text-slate-300 mx-auto mb-3" />
            <p className="text-slate-500 mb-2">Henüz fatura yok</p>
            <p className="text-xs text-slate-400">Yeni Fatura butonuna basarak ekleyin</p>
          </div>
        ) : (
          <div className="divide-y divide-slate-100">
            {filtreliFaturalar.map(f => {
              const seciliMi = seciliFaturalar.includes(f.id);
              const urunSayisi = (f.urunler || []).length;
              return (
                <div key={f.id} className={`p-4 hover:bg-slate-50 ${seciliMi ? 'bg-blue-50' : ''}`}>
                  <div className="flex flex-col md:flex-row md:items-center gap-3">
                    {/* Seç */}
                    <input
                      type="checkbox"
                      checked={seciliMi}
                      onChange={e => {
                        if (e.target.checked) setSeciliFaturalar([...seciliFaturalar, f.id]);
                        else setSeciliFaturalar(seciliFaturalar.filter(id => id !== f.id));
                      }}
                      className="w-4 h-4"
                    />
                    
                    {/* Foto */}
                    {f.fotoUrl ? (
                      <img 
                        src={f.fotoUrl} 
                        alt="fatura" 
                        onClick={() => setFoto(f.fotoUrl)}
                        className="w-14 h-14 object-cover rounded-lg cursor-pointer hover:opacity-80"
                      />
                    ) : (
                      <div className="w-14 h-14 bg-slate-100 rounded-lg flex items-center justify-center">
                        <Receipt className="w-6 h-6 text-slate-400" />
                      </div>
                    )}

                    {/* Bilgi */}
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-semibold text-slate-900">{f.tedarikciAdi || 'Bilinmiyor'}</span>
                        {f.faturaNo && (
                          <span className="text-xs bg-slate-100 px-2 py-0.5 rounded">No: {f.faturaNo}</span>
                        )}
                        {f.odendi ? (
                          <span style={{backgroundColor:'#dcfce7', color:'#15803d'}} className="text-xs px-2 py-0.5 rounded font-semibold">✓ ÖDENDİ</span>
                        ) : (
                          <span style={{backgroundColor:'#fee2e2', color:'#b91c1c'}} className="text-xs px-2 py-0.5 rounded font-semibold">⚠ ÖDENMEDİ</span>
                        )}
                      </div>
                      <div className="text-xs text-slate-500 mt-1">
                        {formatTarih(f.tarih)}
                        {urunSayisi > 0 && ` · ${urunSayisi} ürün`}
                        {f.notlar && ` · ${f.notlar}`}
                      </div>
                    </div>

                    {/* Tutar */}
                    <div className="text-right">
                      <div className="text-lg font-bold text-slate-900">{formatPara(f.toplam || 0)}</div>
                      {f.kdv > 0 && <div className="text-xs text-slate-500">KDV: {formatPara(f.kdv)}</div>}
                    </div>

                    {/* Aksiyonlar */}
                    <div className="flex items-center gap-1">
                      <button
                        onClick={() => odemeYap(f)}
                        title={f.odendi ? 'Ödenmemiş olarak işaretle' : 'Ödendi olarak işaretle'}
                        className={`p-2 rounded-lg ${f.odendi ? 'text-green-600 hover:bg-green-50' : 'text-red-600 hover:bg-red-50'}`}
                      >
                        {f.odendi ? <Check className="w-4 h-4" /> : <DollarSign className="w-4 h-4" />}
                      </button>
                      <button
                        onClick={() => setModal({ tip: 'duzenle', fatura: f })}
                        className="p-2 rounded-lg text-blue-600 hover:bg-blue-50"
                      >
                        <Edit2 className="w-4 h-4" />
                      </button>
                      <button
                        onClick={() => faturaSil(f.id)}
                        className="p-2 rounded-lg text-red-600 hover:bg-red-50"
                      >
                        <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* Modal: Yeni/Düzenle Fatura */}
      {modal && (
        <FaturaModal
          fatura={modal.fatura}
          tedarikciler={tedarikciler}
          setTedarikciler={setTedarikciler}
          urunler={urunler}
          setUrunler={setUrunler}
          formatPara={formatPara}
          yeniId={yeniId}
          onKapat={() => setModal(null)}
          onKaydet={(yeniFatura) => {
            if (modal.tip === 'yeni') {
              setFaturalar([...faturalar, { ...yeniFatura, id: yeniId() }]);
            } else {
              setFaturalar(faturalar.map(f => f.id === modal.fatura.id ? { ...f, ...yeniFatura } : f));
            }
            setModal(null);
          }}
        />
      )}

      {/* Modal: Tedarikçiler */}
      {tedarikciModal && (
        <TedarikciModal
          tedarikciler={tedarikciler}
          setTedarikciler={setTedarikciler}
          faturalar={faturalar}
          formatPara={formatPara}
          yeniId={yeniId}
          onKapat={() => setTedarikciModal(false)}
        />
      )}

      {/* Foto modal */}
      {foto && (
        <div onClick={() => setFoto(null)} className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
          <button onClick={() => setFoto(null)} style={{backgroundColor:'#dc2626'}} className="absolute top-4 right-4 w-10 h-10 rounded-full text-white text-xl font-bold">×</button>
          <img src={foto} alt="fatura" style={{maxWidth: "95vw", maxHeight: "90vh"}} className="object-contain rounded-lg" />
        </div>
      )}
    </div>
  );
}

// ============================================
// FATURA MODAL (YENİ/DÜZENLE)
// ============================================
function FaturaModal({ fatura, tedarikciler, setTedarikciler, urunler, setUrunler, formatPara, yeniId, onKapat, onKaydet }) {
  const duzenleme = !!fatura;
  const [tedarikciAdi, setTedarikciAdi] = useState(fatura?.tedarikciAdi || '');
  const [faturaNo, setFaturaNo] = useState(fatura?.faturaNo || '');
  const [tarih, setTarih] = useState(fatura?.tarih ? fatura.tarih.slice(0, 10) : new Date().toISOString().slice(0, 10));
  const [kdv, setKdv] = useState(fatura?.kdv?.toString() || '0');
  const [odendi, setOdendi] = useState(fatura?.odendi || false);
  const [notlar, setNotlar] = useState(fatura?.notlar || '');
  const [fotoUrl, setFotoUrl] = useState(fatura?.fotoUrl || '');
  const [yukleniyor, setYukleniyor] = useState(false);
  const [stokaEkle, setStokaEkle] = useState(false);
  
  // Ürün kalemleri
  const [kalemler, setKalemler] = useState(() => {
    if (fatura?.urunler && fatura.urunler.length > 0) return [...fatura.urunler];
    return [{ id: 1, kod: '', ad: '', adet: '1', fiyat: '' }];
  });

  const kalemEkle = () => {
    setKalemler([...kalemler, { id: Date.now(), kod: '', ad: '', adet: '1', fiyat: '' }]);
  };

  const kalemSil = (id) => {
    setKalemler(kalemler.filter(k => k.id !== id));
  };

  const kalemGuncelle = (id, alan, deger) => {
    setKalemler(kalemler.map(k => k.id === id ? { ...k, [alan]: deger } : k));
  };

  // Toplam hesapla
  const araToplam = kalemler.reduce((t, k) => {
    const adet = parseFloat(k.adet) || 0;
    const fiyat = parseFloat(k.fiyat) || 0;
    return t + (adet * fiyat);
  }, 0);
  const kdvTutari = araToplam * (parseFloat(kdv) || 0) / 100;
  const toplam = araToplam + kdvTutari;

  // Fotoğraf seç
  const fotoSec = async (event) => {
    const dosya = event.target.files[0];
    if (!dosya) return;
    setYukleniyor(true);
    try {
      const okuyucu = new FileReader();
      okuyucu.onload = async (e) => {
        const resim = new Image();
        resim.onload = async () => {
          try {
            const kanvas = document.createElement('canvas');
            const maxBoyut = 1200;
            let { width, height } = resim;
            if (width > maxBoyut || height > maxBoyut) {
              const oran = Math.min(maxBoyut / width, maxBoyut / height);
              width *= oran;
              height *= oran;
            }
            kanvas.width = width;
            kanvas.height = height;
            const ctx = kanvas.getContext('2d');
            ctx.drawImage(resim, 0, 0, width, height);
            const base64 = kanvas.toDataURL('image/jpeg', 0.75);
            const url = await window.cloudinaryYukle(base64);
            setFotoUrl(url);
          } catch(err) {
            alert('Fotoğraf yüklenemedi: ' + err.message);
          }
          setYukleniyor(false);
        };
        resim.src = e.target.result;
      };
      okuyucu.readAsDataURL(dosya);
    } catch(e) {
      alert('Hata: ' + e.message);
      setYukleniyor(false);
    }
  };

  const kaydet = () => {
    if (!tedarikciAdi.trim()) return alert('Tedarikçi adı girin');
    if (toplam <= 0) return alert('Toplam tutar 0\'dan büyük olmalı');

    const gecerliKalemler = kalemler.filter(k => k.ad.trim() && parseFloat(k.fiyat) > 0);

    // Eğer "Stoğa Ekle" işaretliyse, ürünleri stoğa ekle
    if (stokaEkle && !duzenleme && gecerliKalemler.length > 0) {
      const yeniUrunler = [...urunler];
      gecerliKalemler.forEach(k => {
        const mevcut = yeniUrunler.find(u => 
          (k.kod && u.kod === k.kod) || 
          (u.ad || '').toLowerCase() === k.ad.toLowerCase()
        );
        if (mevcut) {
          // Mevcut ürünün stoğunu artır
          mevcut.stok = (mevcut.stok || 0) + parseFloat(k.adet);
          mevcut.alisFiyati = parseFloat(k.fiyat);
        } else {
          // Yeni ürün ekle - mevcut sistemin alan adlarını kullan
          yeniUrunler.push({
            id: yeniId(),
            kod: k.kod || 'F' + Date.now().toString().slice(-6),
            ad: k.ad,
            barkod: '',
            kategori: '',
            stok: parseFloat(k.adet),
            alisFiyati: parseFloat(k.fiyat),
            satisFiyati: parseFloat(k.fiyat) * 1.3,
            fotolar: [],
            foto: '',
            eklenmeTarihi: new Date().toISOString()
          });
        }
      });
      setUrunler(yeniUrunler);
    }

    // Tedarikçiyi listeye ekle (yoksa)
    const tedAdiAlt = tedarikciAdi.trim();
    if (!tedarikciler.find(t => t.ad.toLowerCase() === tedAdiAlt.toLowerCase())) {
      setTedarikciler([...tedarikciler, { id: yeniId(), ad: tedAdiAlt, telefon: '', not: '' }]);
    }

    onKaydet({
      tedarikciAdi: tedAdiAlt,
      faturaNo: faturaNo.trim(),
      tarih: tarih + 'T' + new Date().toISOString().slice(11),
      urunler: gecerliKalemler.map(k => ({
        kod: k.kod.trim(),
        ad: k.ad.trim(),
        adet: parseFloat(k.adet),
        fiyat: parseFloat(k.fiyat)
      })),
      araToplam,
      kdv: kdvTutari,
      kdvOrani: parseFloat(kdv) || 0,
      toplam,
      odendi,
      odemeTarihi: odendi ? new Date().toISOString() : null,
      notlar: notlar.trim(),
      fotoUrl
    });
  };

  return (
    <div onClick={onKapat} className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 overflow-y-auto">
      <div onClick={e => e.stopPropagation()} className="bg-white rounded-2xl max-w-3xl w-full my-8 max-h-[90vh] overflow-y-auto">
        <div className="sticky top-0 bg-white border-b border-slate-200 p-4 flex items-center justify-between rounded-t-2xl">
          <h2 className="text-lg font-bold text-slate-900">{duzenleme ? 'Fatura Düzenle' : 'Yeni Fatura'}</h2>
          <button onClick={onKapat} className="p-1.5 hover:bg-slate-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>

        <div className="p-4 space-y-4">
          {/* Tedarikçi */}
          <div>
            <label className="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">TEDARİKÇİ *</label>
            <input
              type="text"
              value={tedarikciAdi}
              onChange={e => setTedarikciAdi(e.target.value)}
              placeholder="Tedarikçi/Toptancı adı"
              list="tedarikci-listesi"
              className="form-input"
            />
            <datalist id="tedarikci-listesi">
              {tedarikciler.map(t => <option key={t.id} value={t.ad} />)}
            </datalist>
            {tedarikciler.length > 0 && (
              <div className="flex flex-wrap gap-1 mt-2">
                {tedarikciler.slice(0, 5).map(t => (
                  <button key={t.id} onClick={() => setTedarikciAdi(t.ad)} className="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded">
                    {t.ad}
                  </button>
                ))}
              </div>
            )}
          </div>

          {/* Tarih ve No */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Tarih</label>
              <input type="date" value={tarih} onChange={e => setTarih(e.target.value)} className="form-input" />
            </div>
            <div>
              <label className="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Fatura No</label>
              <input type="text" value={faturaNo} onChange={e => setFaturaNo(e.target.value)} placeholder="Opsiyonel" className="form-input" />
            </div>
          </div>

          {/* Fotoğraf */}
          <div>
            <label className="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Fatura Fotoğrafı</label>
            {fotoUrl ? (
              <div className="relative">
                <img src={fotoUrl} alt="fatura" className="w-full h-48 object-cover rounded-lg" />
                <button onClick={() => setFotoUrl('')} style={{backgroundColor:'#dc2626'}} className="absolute top-2 right-2 w-8 h-8 rounded-full text-white font-bold">×</button>
              </div>
            ) : (
              <label style={{borderColor:'#f59e0b', color:'#92400e'}} className="block border-2 border-dashed rounded-lg p-4 text-center cursor-pointer hover:bg-amber-50">
                <Camera className="w-6 h-6 mx-auto mb-1" />
                <span className="text-sm font-semibold">{yukleniyor ? 'Yükleniyor...' : 'Fatura fotoğrafı ekle'}</span>
                <input type="file" accept="image/*" onChange={fotoSec} className="hidden" disabled={yukleniyor} />
              </label>
            )}
          </div>

          {/* Ürün Kalemleri */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <label className="text-xs font-semibold text-slate-700 uppercase tracking-wider">Ürünler ({kalemler.length})</label>
              <button onClick={kalemEkle} className="text-xs text-amber-700 font-semibold hover:underline flex items-center gap-1">
                <Plus className="w-3 h-3" /> Ürün Ekle
              </button>
            </div>
            <div className="space-y-2">
              {kalemler.map((k, i) => (
                <div key={k.id} className="bg-slate-50 border border-slate-200 rounded-lg p-2">
                  <div className="flex gap-2 items-center mb-2">
                    <span className="text-xs font-bold text-slate-500 w-6">{i+1}</span>
                    <input
                      type="text"
                      value={k.kod}
                      onChange={e => kalemGuncelle(k.id, 'kod', e.target.value)}
                      placeholder="Parça Kodu"
                      className="flex-1 px-2 py-1 text-sm border border-slate-300 rounded"
                    />
                    <input
                      type="text"
                      value={k.ad}
                      onChange={e => kalemGuncelle(k.id, 'ad', e.target.value)}
                      placeholder="Ürün Adı"
                      className="flex-[2] px-2 py-1 text-sm border border-slate-300 rounded"
                    />
                    {kalemler.length > 1 && (
                      <button onClick={() => kalemSil(k.id)} className="p-1 text-red-600 hover:bg-red-50 rounded">
                        <Trash2 className="w-4 h-4" />
                      </button>
                    )}
                  </div>
                  <div className="flex gap-2 items-center text-sm">
                    <input
                      type="number"
                      value={k.adet}
                      onChange={e => kalemGuncelle(k.id, 'adet', e.target.value)}
                      placeholder="Adet"
                      className="w-20 px-2 py-1 border border-slate-300 rounded text-center"
                    />
                    <span className="text-slate-500">×</span>
                    <input
                      type="number"
                      value={k.fiyat}
                      onChange={e => kalemGuncelle(k.id, 'fiyat', e.target.value)}
                      placeholder="Birim Fiyat"
                      className="flex-1 px-2 py-1 border border-slate-300 rounded"
                    />
                    <span className="text-slate-500">=</span>
                    <span className="font-bold text-slate-900 w-24 text-right">
                      {formatPara((parseFloat(k.adet) || 0) * (parseFloat(k.fiyat) || 0))}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Stoğa ekle seçeneği (sadece yeni faturada) */}
          {!duzenleme && (
            <label className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg p-3 cursor-pointer">
              <input type="checkbox" checked={stokaEkle} onChange={e => setStokaEkle(e.target.checked)} className="w-4 h-4" />
              <span className="text-sm text-blue-900">
                ✅ <b>Bu faturadaki ürünleri otomatik stoğa ekle</b><br/>
                <span className="text-xs">Mevcut ürünlerin stoğu artırılır, yeni ürünler eklenir</span>
              </span>
            </label>
          )}

          {/* KDV ve Toplam */}
          <div className="bg-slate-50 rounded-lg p-3 space-y-2">
            <div className="flex justify-between text-sm">
              <span className="text-slate-600">Ara Toplam:</span>
              <span className="font-semibold">{formatPara(araToplam)}</span>
            </div>
            <div className="flex justify-between text-sm items-center gap-2">
              <span className="text-slate-600">KDV (%):</span>
              <input
                type="number"
                value={kdv}
                onChange={e => setKdv(e.target.value)}
                className="w-20 px-2 py-1 text-right border border-slate-300 rounded"
              />
              <span className="font-semibold w-32 text-right">{formatPara(kdvTutari)}</span>
            </div>
            <div className="flex justify-between text-lg pt-2 border-t border-slate-200">
              <span className="font-bold text-slate-900">TOPLAM:</span>
              <span className="font-bold text-amber-700">{formatPara(toplam)}</span>
            </div>
          </div>

          {/* Ödeme durumu */}
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={odendi} onChange={e => setOdendi(e.target.checked)} className="w-4 h-4" />
            <span className="text-sm font-semibold text-slate-700">Bu fatura ödendi</span>
          </label>

          {/* Notlar */}
          <div>
            <label className="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Notlar</label>
            <textarea
              value={notlar}
              onChange={e => setNotlar(e.target.value)}
              placeholder="Ek bilgiler..."
              rows={2}
              className="form-input"
            />
          </div>
        </div>

        {/* Footer */}
        <div className="sticky bottom-0 bg-white border-t border-slate-200 p-4 flex gap-2 rounded-b-2xl">
          <button onClick={onKapat} className="flex-1 px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg font-semibold text-sm">İptal</button>
          <button onClick={kaydet} style={{backgroundColor:'#f59e0b', color:'#1f2937'}} className="flex-1 px-4 py-2 rounded-lg font-semibold text-sm hover:opacity-90">
            {duzenleme ? 'Güncelle' : 'Kaydet'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================
// TEDARİKÇİ MODAL
// ============================================
function TedarikciModal({ tedarikciler, setTedarikciler, faturalar, formatPara, yeniId, onKapat }) {
  const [yeniAd, setYeniAd] = useState('');
  const [yeniTel, setYeniTel] = useState('');

  const tedarikciEkle = () => {
    if (!yeniAd.trim()) return;
    setTedarikciler([...tedarikciler, { id: yeniId(), ad: yeniAd.trim(), telefon: yeniTel.trim(), not: '' }]);
    setYeniAd('');
    setYeniTel('');
  };

  const tedarikciSil = (id, ad) => {
    if (!confirm(`"${ad}" silinsin mi? (Mevcut faturalar etkilenmez)`)) return;
    setTedarikciler(tedarikciler.filter(t => t.id !== id));
  };

  // Her tedarikçi için toplam borç ve fatura sayısı
  const tedarikciIstatistik = (ad) => {
    const fts = faturalar.filter(f => f.tedarikciAdi === ad);
    const toplam = fts.reduce((s, f) => s + (f.toplam || 0), 0);
    const odenmemis = fts.filter(f => !f.odendi).reduce((s, f) => s + (f.toplam || 0), 0);
    return { sayi: fts.length, toplam, odenmemis };
  };

  return (
    <div onClick={onKapat} className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
      <div onClick={e => e.stopPropagation()} className="bg-white rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto">
        <div className="sticky top-0 bg-white border-b border-slate-200 p-4 flex items-center justify-between rounded-t-2xl">
          <h2 className="text-lg font-bold text-slate-900">Tedarikçiler ({tedarikciler.length})</h2>
          <button onClick={onKapat} className="p-1.5 hover:bg-slate-100 rounded-lg"><X className="w-5 h-5" /></button>
        </div>

        <div className="p-4 space-y-3">
          {/* Yeni Ekle */}
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 space-y-2">
            <label className="text-xs font-semibold text-amber-900">Yeni Tedarikçi Ekle</label>
            <input
              type="text"
              value={yeniAd}
              onChange={e => setYeniAd(e.target.value)}
              placeholder="Tedarikçi adı"
              className="form-input"
            />
            <input
              type="text"
              value={yeniTel}
              onChange={e => setYeniTel(e.target.value)}
              placeholder="Telefon (opsiyonel)"
              className="form-input"
            />
            <button onClick={tedarikciEkle} style={{backgroundColor:'#f59e0b', color:'#1f2937'}} className="w-full px-3 py-2 rounded-lg font-semibold text-sm">
              + Ekle
            </button>
          </div>

          {/* Liste */}
          {tedarikciler.length === 0 ? (
            <div className="text-center text-slate-500 py-6">Henüz tedarikçi yok</div>
          ) : (
            <div className="space-y-2">
              {tedarikciler.map(t => {
                const stat = tedarikciIstatistik(t.ad);
                return (
                  <div key={t.id} className="border border-slate-200 rounded-lg p-3">
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex-1 min-w-0">
                        <div className="font-semibold text-slate-900">{t.ad}</div>
                        {t.telefon && <div className="text-xs text-slate-500 mt-0.5">📞 {t.telefon}</div>}
                        <div className="text-xs text-slate-500 mt-1">
                          {stat.sayi} fatura · Toplam: {formatPara(stat.toplam)}
                          {stat.odenmemis > 0 && (
                            <span className="ml-2" style={{color:'#dc2626', fontWeight:600}}>
                              · Borç: {formatPara(stat.odenmemis)}
                            </span>
                          )}
                        </div>
                      </div>
                      <button onClick={() => tedarikciSil(t.id, t.ad)} className="p-1.5 text-red-600 hover:bg-red-50 rounded">
                        <Trash2 className="w-4 h-4" />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


document.getElementById('yukleme').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<StokVeresiyeUygulamasi />);
